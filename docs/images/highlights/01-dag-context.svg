<svg width="1600" height="640" viewBox="0 0 1600 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B9EFF"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3B9EFF" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#3B9EFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#5AAD4E" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#5AAD4E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="640" rx="28" fill="#141416"/>
  <rect x="1" y="1" width="1598" height="638" rx="27" fill="none" stroke="#2A2A30" stroke-width="1.5"/>
  <ellipse cx="1120" cy="240" rx="430" ry="330" fill="url(#glow)"/>
  <ellipse cx="1360" cy="470" rx="330" ry="280" fill="url(#glow2)"/>

  <text x="80" y="96" font-family="Geist Mono" font-size="21" fill="#5B5B66" letter-spacing="4">01 / 03</text>

  <text x="78" y="196" font-family="Instrument Sans" font-weight="700" font-size="72" fill="#F5F5F7">DAG Context</text>

  <text x="80" y="258" font-family="Geist Mono" font-size="23" fill="#8A8A96">the shared context model that unlocks</text>
  <text x="80" y="312" font-family="Instrument Sans" font-weight="700" font-size="40" fill="url(#bp)">Native Multi-agent Systems</text>

  <text x="80" y="392" font-family="Instrument Sans" font-size="25" fill="#B4B4C0">Every user, LLM, and function call is one node on a single flat</text>
  <text x="80" y="428" font-family="Instrument Sans" font-size="25" fill="#B4B4C0">DAG, tied by two edges: <tspan font-family="Geist Mono" font-size="22" fill="#7FC4FF">caller</tspan> (who ran whom) and</text>
  <text x="80" y="464" font-family="Instrument Sans" font-size="25" fill="#B4B4C0"><tspan font-family="Geist Mono" font-size="22" fill="#C9A6FF">predecessor</tspan> (the conversation order).</text>

  <text x="80" y="528" font-family="Instrument Sans" font-size="25" fill="#B4B4C0">Context is an addressable node, not a private buffer — so a</text>
  <text x="80" y="564" font-family="Instrument Sans" font-size="25" fill="#B4B4C0">branch can spawn a sub-agent on its own lane and attach the</text>
  <text x="80" y="600" font-family="Instrument Sans" font-size="25" fill="#B4B4C0">result back, all on the same graph.</text>

  <!-- ===== DAG diagram (right) — faithful to session-dag-viz.svg ===== -->
  <!-- node shapes: ROOT=diamond, user=circle, llm=triangle, code=square.
       main lane = blue #4F8EF7, sub-agent lane = green #5AAD4E.
       edges: caller/predecessor = solid; spawn = dash-dot; attach = long-dash -->
  <g transform="translate(902,120)">

    <!-- legend -->
    <g font-family="Geist Mono" font-size="14" fill="#8A8A96">
      <g transform="translate(0,0)">
        <rect x="-6" y="-6" width="12" height="12" rx="1.5" transform="rotate(45)" fill="none" stroke="#7A8A9A" stroke-width="2"/>
        <text x="14" y="4">root</text>
      </g>
      <g transform="translate(90,0)">
        <circle r="6" fill="none" stroke="#7A8A9A" stroke-width="2"/>
        <text x="14" y="4">user</text>
      </g>
      <g transform="translate(180,0)">
        <polygon points="0,-7 6,5 -6,5" fill="none" stroke="#7A8A9A" stroke-width="2"/>
        <text x="14" y="4">llm</text>
      </g>
      <g transform="translate(258,0)">
        <rect x="-6" y="-6" width="12" height="12" fill="none" stroke="#7A8A9A" stroke-width="2"/>
        <text x="14" y="4">code</text>
      </g>
    </g>

    <!-- ===== MAIN LANE (blue) ===== -->
    <!-- trunk vertical line from ROOT -->
    <line x1="20" y1="60" x2="20" y2="250" stroke="#4F8EF7" stroke-width="2.2"/>

    <!-- ROOT -->
    <g transform="translate(20,48)">
      <rect x="-8" y="-8" width="16" height="16" rx="2" transform="rotate(45)" fill="#4F8EF7" stroke="#4F8EF7" stroke-width="2.4"/>
      <text x="20" y="5" font-family="Geist Mono" font-size="15" fill="#C7D4E4">ROOT</text>
    </g>

    <!-- user1 -->
    <line x1="20" y1="98" x2="44" y2="98" stroke="#4F8EF7" stroke-width="2.2"/>
    <g transform="translate(56,98)">
      <circle r="7" fill="#4F8EF7"/>
      <text x="16" y="5" font-family="Geist Mono" font-size="15" fill="#C7D4E4">user  "research X"</text>
    </g>
    <!-- user1 -> llm1 (L shape) -->
    <line x1="56" y1="108" x2="56" y2="140" stroke="#4F8EF7" stroke-width="2.2"/>
    <line x1="56" y1="140" x2="82" y2="140" stroke="#4F8EF7" stroke-width="2.2"/>
    <g transform="translate(94,140)">
      <polygon points="0,-8 7,6 -7,6" fill="#4F8EF7"/>
      <text x="18" y="5" font-family="Geist Mono" font-size="15" fill="#C7D4E4">llm  · spawns a sub-agent</text>
    </g>

    <!-- next turn: user2 back at tier 1 -->
    <line x1="20" y1="250" x2="44" y2="250" stroke="#4F8EF7" stroke-width="2.2"/>
    <g transform="translate(56,250)">
      <circle r="7" fill="#4F8EF7"/>
      <text x="16" y="5" font-family="Geist Mono" font-size="15" fill="#C7D4E4">user  sees B's result, continues</text>
    </g>
    <line x1="56" y1="260" x2="56" y2="292" stroke="#4F8EF7" stroke-width="2.2"/>
    <line x1="56" y1="292" x2="82" y2="292" stroke="#4F8EF7" stroke-width="2.2"/>
    <g transform="translate(94,292)">
      <polygon points="0,-8 7,6 -7,6" fill="#4F8EF7"/>
      <text x="18" y="5" font-family="Geist Mono" font-size="15" fill="#C7D4E4">llm</text>
    </g>

    <!-- ===== SUB-AGENT LANE B (green), offset right into a new column ===== -->
    <!-- spawn edge: llm1 -> B-root (dash-dot), green -->
    <path d="M108 140 C 270 140, 290 165, 380 178" fill="none" stroke="#5AAD4E" stroke-width="2.2" stroke-dasharray="6 3 1 3"/>
    <text x="270" y="128" font-family="Geist Mono" font-size="14" fill="#6FC463">spawn_branch(task)</text>

    <!-- B lane trunk -->
    <line x1="380" y1="178" x2="380" y2="210" stroke="#5AAD4E" stroke-width="2.2"/>

    <!-- B-root (user node, new lane) -->
    <g transform="translate(380,178)">
      <circle r="7" fill="none" stroke="#5AAD4E" stroke-width="2.6"/>
      <text x="16" y="5" font-family="Geist Mono" font-size="15" fill="#8ED07F">agent B</text>
    </g>
    <!-- B: llm -->
    <line x1="380" y1="210" x2="406" y2="210" stroke="#5AAD4E" stroke-width="2.2"/>
    <g transform="translate(418,210)">
      <polygon points="0,-8 7,6 -7,6" fill="none" stroke="#5AAD4E" stroke-width="2.6"/>
      <text x="18" y="5" font-family="Geist Mono" font-size="15" fill="#8ED07F">llm</text>
    </g>
    <!-- B: code (tool) -->
    <line x1="418" y1="218" x2="418" y2="248" stroke="#5AAD4E" stroke-width="2.2"/>
    <line x1="418" y1="248" x2="444" y2="248" stroke="#5AAD4E" stroke-width="2.2"/>
    <g transform="translate(456,248)">
      <rect x="-7" y="-7" width="14" height="14" fill="none" stroke="#5AAD4E" stroke-width="2.6"/>
      <text x="18" y="5" font-family="Geist Mono" font-size="15" fill="#8ED07F">search_tool</text>
    </g>

    <!-- attach: B's tip -> back to main lane user2 (long-dash), green -->
    <path d="M456 258 C 420 320, 200 300, 76 262" fill="none" stroke="#5AAD4E" stroke-width="2.2" stroke-dasharray="7 6" opacity="0.85"/>
    <text x="240" y="330" font-family="Geist Mono" font-size="14" fill="#6FC463" text-anchor="middle">attach result &#8594;</text>
  </g>
</svg>
