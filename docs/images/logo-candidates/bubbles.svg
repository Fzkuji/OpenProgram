<svg width="1400" height="900" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B9EFF"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="bpH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3B9EFF"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <radialGradient id="b1" cx="0.35" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#6FB6FF"/><stop offset="1" stop-color="#2F7FE0"/>
    </radialGradient>
    <radialGradient id="b2" cx="0.35" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#B98CF5"/><stop offset="1" stop-color="#8A46D8"/>
    </radialGradient>
    <radialGradient id="b3" cx="0.35" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#7E9BF0"/><stop offset="1" stop-color="#5A5FD0"/>
    </radialGradient>
  </defs>

  <rect width="1400" height="900" rx="20" fill="#141416"/>
  <text x="60" y="66" font-family="Instrument Sans" font-weight="700" font-size="32" fill="#F5F5F7">Bubbles — a ring that holds it all</text>
  <text x="60" y="98" font-family="Geist Mono" font-size="15" fill="#8A8A96">the container ring + different-sized bubbles inside · "we hold anything"</text>

  <!-- ===== A: filled glossy bubbles ===== -->
  <g transform="translate(60,150)">
    <rect x="0" y="0" width="620" height="300" rx="16" fill="#1A1A1E" stroke="#2E2E36" stroke-width="1.5"/>
    <text x="24" y="36" font-family="Geist Mono" font-size="16" fill="#5FA8FF">A · glossy filled bubbles</text>
    <g transform="translate(120,170)">
      <circle r="72" fill="none" stroke="url(#bp)" stroke-width="5"/>
      <circle cx="-20" cy="-18" r="30" fill="url(#b1)"/>
      <circle cx="28" cy="10" r="22" fill="url(#b2)"/>
      <circle cx="-8" cy="34" r="15" fill="url(#b3)"/>
      <circle cx="26" cy="-30" r="10" fill="#6FB6FF" opacity="0.9"/>
      <!-- highlights -->
      <circle cx="-28" cy="-28" r="7" fill="#ffffff" opacity="0.35"/>
      <circle cx="22" cy="3" r="5" fill="#ffffff" opacity="0.3"/>
    </g>
    <text x="230" y="185" font-family="Instrument Sans" font-weight="700" font-size="40" fill="#F5F5F7">Open<tspan fill="url(#bpH)">Program</tspan></text>
    <text x="232" y="214" font-family="Geist Mono" font-size="13" fill="#7A7A86" letter-spacing="2">AGENT HARNESS</text>
  </g>

  <!-- ===== B: outlined bubbles (lighter) ===== -->
  <g transform="translate(720,150)">
    <rect x="0" y="0" width="620" height="300" rx="16" fill="#1A1A1E" stroke="#2E2E36" stroke-width="1.5"/>
    <text x="24" y="36" font-family="Geist Mono" font-size="16" fill="#5FA8FF">B · outlined bubbles</text>
    <g transform="translate(120,170)">
      <circle r="72" fill="none" stroke="url(#bp)" stroke-width="5"/>
      <circle cx="-22" cy="-16" r="30" fill="none" stroke="#5FA8FF" stroke-width="4"/>
      <circle cx="28" cy="14" r="22" fill="none" stroke="#A855F7" stroke-width="4"/>
      <circle cx="-6" cy="36" r="14" fill="none" stroke="#7E9BF0" stroke-width="3.5"/>
      <circle cx="30" cy="-28" r="9" fill="none" stroke="#6FB6FF" stroke-width="3"/>
    </g>
    <text x="230" y="185" font-family="Instrument Sans" font-weight="700" font-size="40" fill="#F5F5F7">Open<tspan fill="url(#bpH)">Program</tspan></text>
    <text x="232" y="214" font-family="Geist Mono" font-size="13" fill="#7A7A86" letter-spacing="2">AGENT HARNESS</text>
  </g>

  <!-- ===== C: bubbles with an open gap in the ring (Open!) ===== -->
  <g transform="translate(60,470)">
    <rect x="0" y="0" width="620" height="300" rx="16" fill="#1A1A1E" stroke="#2E2E36" stroke-width="1.5"/>
    <text x="24" y="36" font-family="Geist Mono" font-size="16" fill="#5FA8FF">C · open ring (gap = "Open") + bubbles</text>
    <g transform="translate(120,170)">
      <!-- ring with a gap at top-right -->
      <path d="M 51 -51 A 72 72 0 1 1 51 -51 M 25 -67.5 A 72 72 0 0 0 67.5 -25" fill="none"/>
      <path d="M 60 -40 A 72 72 0 1 0 40 -60" fill="none" stroke="url(#bp)" stroke-width="5" stroke-linecap="round"/>
      <circle cx="-20" cy="-16" r="30" fill="url(#b1)"/>
      <circle cx="28" cy="12" r="22" fill="url(#b2)"/>
      <circle cx="-6" cy="36" r="14" fill="url(#b3)"/>
      <circle cx="-30" cy="-26" r="7" fill="#ffffff" opacity="0.35"/>
    </g>
    <text x="230" y="185" font-family="Instrument Sans" font-weight="700" font-size="40" fill="#F5F5F7">Open<tspan fill="url(#bpH)">Program</tspan></text>
    <text x="232" y="214" font-family="Geist Mono" font-size="13" fill="#7A7A86" letter-spacing="2">AGENT HARNESS</text>
  </g>

  <!-- ===== D: more bubbles, varied, denser cluster ===== -->
  <g transform="translate(720,470)">
    <rect x="0" y="0" width="620" height="300" rx="16" fill="#1A1A1E" stroke="#2E2E36" stroke-width="1.5"/>
    <text x="24" y="36" font-family="Geist Mono" font-size="16" fill="#5FA8FF">D · fuller cluster (5 bubbles)</text>
    <g transform="translate(120,170)">
      <circle r="74" fill="none" stroke="url(#bp)" stroke-width="5"/>
      <circle cx="-26" cy="-20" r="26" fill="url(#b1)"/>
      <circle cx="24" cy="-24" r="18" fill="url(#b2)"/>
      <circle cx="34" cy="20" r="20" fill="url(#b3)"/>
      <circle cx="-18" cy="32" r="16" fill="url(#b2)"/>
      <circle cx="6" cy="4" r="11" fill="url(#b1)"/>
      <circle cx="-32" cy="-28" r="6" fill="#ffffff" opacity="0.35"/>
      <circle cx="19" cy="-30" r="4.5" fill="#ffffff" opacity="0.3"/>
    </g>
    <text x="230" y="185" font-family="Instrument Sans" font-weight="700" font-size="40" fill="#F5F5F7">Open<tspan fill="url(#bpH)">Program</tspan></text>
    <text x="232" y="214" font-family="Geist Mono" font-size="13" fill="#7A7A86" letter-spacing="2">AGENT HARNESS</text>
  </g>

  <text x="60" y="830" font-family="Geist Mono" font-size="14" fill="#6E6E7A">A/B/C/D — pick one (or "A but fewer bubbles", "C with outlined bubbles", etc). Then I make full logo + wordmark + favicon.</text>
</svg>
