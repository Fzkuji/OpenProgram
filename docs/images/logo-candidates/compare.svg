<svg width="1400" height="1120" viewBox="0 0 1400 1120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B9EFF"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="bpH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3B9EFF"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="1120" rx="20" fill="#141416"/>
  <text x="60" y="70" font-family="Instrument Sans" font-weight="700" font-size="34" fill="#F5F5F7">OpenProgram — logo candidates</text>
  <text x="60" y="104" font-family="Geist Mono" font-size="16" fill="#8A8A96">pick a number · icon mark + wordmark · all in the blue→purple brand palette</text>

  <!-- ================= CARD 1: node-ring O ================= -->
  <g transform="translate(60,150)">
    <rect x="0" y="0" width="620" height="270" rx="16" fill="#1A1A1E" stroke="#2E2E36" stroke-width="1.5"/>
    <text x="24" y="36" font-family="Geist Mono" font-size="16" fill="#5FA8FF">01 · node-ring O</text>
    <!-- mark: O made of nodes on a ring -->
    <g transform="translate(110,150)">
      <circle r="56" fill="none" stroke="#2E3A4A" stroke-width="2"/>
      <g fill="url(#bp)">
        <circle cx="0" cy="-56" r="9"/>
        <circle cx="48" cy="-28" r="9"/>
        <circle cx="48" cy="28" r="9"/>
        <circle cx="0" cy="56" r="9"/>
        <circle cx="-48" cy="28" r="9"/>
        <circle cx="-48" cy="-28" r="9"/>
      </g>
      <g stroke="url(#bp)" stroke-width="3" fill="none" opacity="0.9">
        <path d="M0 -56 A56 56 0 0 1 48 -28"/>
        <path d="M48 -28 A56 56 0 0 1 48 28"/>
        <path d="M48 28 A56 56 0 0 1 0 56"/>
        <path d="M0 56 A56 56 0 0 1 -48 28"/>
        <path d="M-48 28 A56 56 0 0 1 -48 -28"/>
        <path d="M-48 -28 A56 56 0 0 1 0 -56"/>
      </g>
    </g>
    <!-- wordmark -->
    <text x="210" y="165" font-family="Instrument Sans" font-weight="700" font-size="42" fill="#F5F5F7">Open<tspan fill="url(#bpH)">Program</tspan></text>
    <text x="212" y="196" font-family="Geist Mono" font-size="14" fill="#7A7A86" letter-spacing="2">AGENT HARNESS</text>
  </g>

  <!-- ================= CARD 2: diagonal-flow O ================= -->
  <g transform="translate(720,150)">
    <rect x="0" y="0" width="620" height="270" rx="16" fill="#1A1A1E" stroke="#2E2E36" stroke-width="1.5"/>
    <text x="24" y="36" font-family="Geist Mono" font-size="16" fill="#5FA8FF">02 · diagonal DAG flow O</text>
    <g transform="translate(110,150)">
      <circle r="54" fill="none" stroke="url(#bp)" stroke-width="6"/>
      <!-- inner down-then-right node chain -->
      <g>
        <circle cx="-22" cy="-22" r="7" fill="#3B9EFF"/>
        <circle cx="-22" cy="10" r="7" fill="#6E8AF0"/>
        <circle cx="14" cy="10" r="7" fill="#A855F7"/>
        <path d="M-22 -22 L-22 10 L14 10" stroke="url(#bp)" stroke-width="3" fill="none"/>
      </g>
    </g>
    <text x="210" y="165" font-family="Instrument Sans" font-weight="700" font-size="42" fill="#F5F5F7">Open<tspan fill="url(#bpH)">Program</tspan></text>
    <text x="212" y="196" font-family="Geist Mono" font-size="14" fill="#7A7A86" letter-spacing="2">AGENT HARNESS</text>
  </g>

  <!-- ================= CARD 3: minimal double-ring O ================= -->
  <g transform="translate(60,450)">
    <rect x="0" y="0" width="620" height="270" rx="16" fill="#1A1A1E" stroke="#2E2E36" stroke-width="1.5"/>
    <text x="24" y="36" font-family="Geist Mono" font-size="16" fill="#5FA8FF">03 · minimal double-ring O</text>
    <g transform="translate(110,150)">
      <circle r="52" fill="none" stroke="url(#bp)" stroke-width="7"/>
      <circle cx="10" cy="0" r="30" fill="none" stroke="#5A6478" stroke-width="4" opacity="0.7"/>
    </g>
    <text x="210" y="165" font-family="Instrument Sans" font-weight="700" font-size="42" fill="#F5F5F7">OpenProgram</text>
    <text x="212" y="196" font-family="Geist Mono" font-size="14" fill="#7A7A86" letter-spacing="2">AGENT HARNESS</text>
  </g>

  <!-- ================= CARD 4: code-flow bracket mark ================= -->
  <g transform="translate(720,450)">
    <rect x="0" y="0" width="620" height="270" rx="16" fill="#1A1A1E" stroke="#2E2E36" stroke-width="1.5"/>
    <text x="24" y="36" font-family="Geist Mono" font-size="16" fill="#5FA8FF">04 · code-flow bracket</text>
    <g transform="translate(110,150)">
      <!-- rounded square container -->
      <rect x="-54" y="-54" width="108" height="108" rx="26" fill="none" stroke="url(#bp)" stroke-width="5"/>
      <!-- >_ style: chevron + node -->
      <path d="M-26 -18 L-2 6 L-26 30" stroke="#3B9EFF" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="24" cy="30" r="8" fill="#A855F7"/>
    </g>
    <text x="210" y="165" font-family="Instrument Sans" font-weight="700" font-size="42" fill="#F5F5F7">Open<tspan fill="url(#bpH)">Program</tspan></text>
    <text x="212" y="196" font-family="Geist Mono" font-size="14" fill="#7A7A86" letter-spacing="2">AGENT HARNESS</text>
  </g>

  <!-- ================= CARD 5: refined DNA / interwoven ================= -->
  <g transform="translate(60,750)">
    <rect x="0" y="0" width="620" height="270" rx="16" fill="#1A1A1E" stroke="#2E2E36" stroke-width="1.5"/>
    <text x="24" y="36" font-family="Geist Mono" font-size="16" fill="#5FA8FF">05 · refined DNA / interwoven</text>
    <g transform="translate(110,150)">
      <!-- two interwoven strands -->
      <path d="M-30 -54 C 30 -30, -30 30, 30 54" stroke="#3B9EFF" stroke-width="5" fill="none"/>
      <path d="M30 -54 C -30 -30, 30 30, -30 54" stroke="#A855F7" stroke-width="5" fill="none"/>
      <!-- rungs -->
      <g stroke="#6E7A9A" stroke-width="2.5" opacity="0.8">
        <line x1="-18" y1="-34" x2="18" y2="-34"/>
        <line x1="-22" y1="0" x2="22" y2="0"/>
        <line x1="-18" y1="34" x2="18" y2="34"/>
      </g>
      <g fill="#F5F5F7">
        <circle cx="-30" cy="-54" r="5"/><circle cx="30" cy="-54" r="5"/>
        <circle cx="-30" cy="54" r="5"/><circle cx="30" cy="54" r="5"/>
      </g>
    </g>
    <text x="210" y="165" font-family="Instrument Sans" font-weight="700" font-size="42" fill="#F5F5F7">Open<tspan fill="url(#bpH)">Program</tspan></text>
    <text x="212" y="196" font-family="Geist Mono" font-size="14" fill="#7A7A86" letter-spacing="2">AGENT HARNESS</text>
  </g>

  <!-- ================= CARD 6: branching node (multi-agent) ================= -->
  <g transform="translate(720,750)">
    <rect x="0" y="0" width="620" height="270" rx="16" fill="#1A1A1E" stroke="#2E2E36" stroke-width="1.5"/>
    <text x="24" y="36" font-family="Geist Mono" font-size="16" fill="#5FA8FF">06 · branching node (multi-agent)</text>
    <g transform="translate(110,150)">
      <!-- root splits into branches -->
      <g stroke="url(#bp)" stroke-width="4" fill="none">
        <path d="M-46 0 L-8 0"/>
        <path d="M-8 0 C 20 0, 24 -34, 48 -40"/>
        <path d="M-8 0 C 20 0, 24 34, 48 40"/>
        <path d="M-8 0 L48 0"/>
      </g>
      <circle cx="-46" cy="0" r="10" fill="#3B9EFF"/>
      <circle cx="-8" cy="0" r="7" fill="#5A8AF0"/>
      <circle cx="48" cy="-40" r="9" fill="#A855F7"/>
      <circle cx="48" cy="0" r="9" fill="#8A7AE0"/>
      <circle cx="48" cy="40" r="9" fill="#A855F7"/>
    </g>
    <text x="210" y="165" font-family="Instrument Sans" font-weight="700" font-size="42" fill="#F5F5F7">Open<tspan fill="url(#bpH)">Program</tspan></text>
    <text x="212" y="196" font-family="Geist Mono" font-size="14" fill="#7A7A86" letter-spacing="2">AGENT HARNESS</text>
  </g>

  <text x="60" y="1085" font-family="Geist Mono" font-size="15" fill="#6E6E7A">tell me a number (1–6), or mix: "mark from 2 + wordmark style of 3". I'll refine the winner into full logo.svg + wordmark + favicon.</text>
</svg>
