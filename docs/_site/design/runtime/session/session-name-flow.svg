<svg width="960" height="780" viewBox="0 0 960 780" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="780" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="var(--canvas)"/>
      <stop offset="1" stop-color="var(--canvas2)"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="var(--shadow)" flood-opacity="0.38"/>
    </filter>
    <marker id="aPurple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#bc8cf2"/>
    </marker>
    <marker id="aBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#58a6ff"/>
    </marker>
    <marker id="aGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3fb950"/>
    </marker>
    <marker id="aAmber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d9a73a"/>
    </marker>
    <style>
      svg {
        --canvas:#0d1117; --canvas2:#0f1722; --card:#161b22; --border:#30363d;
        --ink:#e6edf3; --muted:#8b949e; --shadow:#000000;
        --purple-fill:#1d1530; --purple-border:#3d2e52;
        --blue-fill:#0f2030; --blue-border:#1f3354;
        --green-fill:#10231a; --green-border:#1f4030;
        --amber-fill:#241a0f; --amber-border:#4a3414;
        --grey-fill:#15191f; --grey-border:#2a2f37;
      }
      @media (prefers-color-scheme: light) {
        svg {
          --canvas:#ffffff; --canvas2:#f6f8fa; --card:#f6f8fa; --border:#d0d7de;
          --ink:#1f2328; --muted:#636c76; --shadow:#57606a;
          --purple-fill:#faf3ff; --purple-border:#e7d8fb;
          --blue-fill:#ddf4ff; --blue-border:#b6e3ff;
          --green-fill:#e9f8ee; --green-border:#bef0cb;
          --amber-fill:#fff8e6; --amber-border:#f5d98a;
          --grey-fill:#eef1f4; --grey-border:#d8dde2;
        }
      }
      .flow { stroke-dasharray: 6 7; animation: dash 1.6s linear infinite; }
      @keyframes dash { to { stroke-dashoffset: -13; } }
      .t { fill: var(--ink); } .s { fill: var(--muted); }
    </style>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="958" height="778" rx="16" fill="url(#bg)" stroke="var(--border)"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" font-size="20" font-weight="700" class="t">Session Name 生命周期</text>
  <text x="480" y="58" text-anchor="middle" font-size="11" class="s">三个来源可互相覆盖，所有路径汇入同一个写入入口</text>

  <!-- ============================================================ -->
  <!-- LEFT: 自动命名 — 紫色 -->
  <!-- ============================================================ -->

  <text x="250" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#bc8cf2">自动命名（首轮，一次性）</text>

  <!-- 触发 -->
  <g filter="url(#soft)">
    <rect x="60" y="92" width="380" height="40" rx="20" fill="var(--purple-fill)" stroke="#bc8cf2" stroke-width="1.4"/>
    <text x="250" y="117" text-anchor="middle" font-size="13" font-weight="600" fill="#bc8cf2">用户发送第一条消息</text>
  </g>

  <line x1="250" y1="132" x2="250" y2="152" stroke="#bc8cf2" stroke-width="1.2" marker-end="url(#aPurple)"/>

  <!-- dispatcher + finalize -->
  <g filter="url(#soft)">
    <rect x="80" y="152" width="340" height="34" rx="8" fill="var(--purple-fill)" stroke="var(--purple-border)"/>
    <text x="250" y="174" text-anchor="middle" font-size="11" fill="#bc8cf2">dispatcher → turn → finalize_turn</text>
  </g>

  <line x1="250" y1="186" x2="250" y2="206" stroke="#bc8cf2" stroke-width="1.2" marker-end="url(#aPurple)"/>

  <!-- 幂等判断: _auto_titled? -->
  <g filter="url(#soft)">
    <polygon points="250,206 345,236 250,266 155,236" fill="var(--amber-fill)" stroke="#d9a73a" stroke-width="1.2"/>
    <text x="250" y="238" text-anchor="middle" font-size="10" font-weight="600" fill="#d9a73a">首次?</text>
    <text x="250" y="252" text-anchor="middle" font-size="7.5" class="s">_auto_titled 幂等</text>
  </g>

  <!-- 已触发过 → 跳过 -->
  <line x1="345" y1="236" x2="420" y2="236" stroke="#d9a73a" stroke-width="1.2" marker-end="url(#aAmber)"/>
  <text x="378" y="229" font-size="9" fill="#d9a73a">否</text>
  <g filter="url(#soft)">
    <rect x="420" y="222" width="80" height="28" rx="8" fill="var(--grey-fill)" stroke="var(--grey-border)"/>
    <text x="460" y="240" text-anchor="middle" font-size="9.5" class="s">跳过</text>
  </g>

  <!-- 首次 → 继续 -->
  <line x1="250" y1="266" x2="250" y2="288" stroke="#bc8cf2" stroke-width="1.2" marker-end="url(#aPurple)"/>
  <text x="263" y="280" font-size="9" fill="#bc8cf2">是</text>

  <!-- 同步: 立即截取 -->
  <g filter="url(#soft)">
    <rect x="70" y="288" width="360" height="46" rx="10" fill="var(--purple-fill)" stroke="#bc8cf2" stroke-width="1.4"/>
    <text x="250" y="308" text-anchor="middle" font-size="11" font-weight="600" fill="#bc8cf2">同步: 立即截取名字写入</text>
    <text x="250" y="324" text-anchor="middle" font-size="9" class="s">title = 用户消息前 50 字符 → 侧边栏零延迟显示</text>
  </g>

  <line x1="250" y1="334" x2="250" y2="358" stroke="#bc8cf2" stroke-width="1.2" marker-end="url(#aPurple)"/>

  <!-- 异步: 后台 LLM -->
  <g filter="url(#soft)">
    <rect x="50" y="358" width="400" height="82" rx="10" fill="var(--purple-fill)" stroke="#bc8cf2" stroke-width="1.4"/>
    <text x="250" y="378" text-anchor="middle" font-size="11" font-weight="600" fill="#bc8cf2">异步: 后台 daemon 线程调用 LLM</text>
    <text x="250" y="396" text-anchor="middle" font-size="9" class="s">prompt: "Generate a concise title (3-7 words)..."</text>
    <text x="250" y="410" text-anchor="middle" font-size="9" class="s">输入: &lt;session&gt; 包裹（防注入）· 语言跟随对话内容</text>
    <text x="250" y="424" text-anchor="middle" font-size="9" class="s">模型: small_model → build_default_llm() fallback</text>
    <text x="250" y="436" text-anchor="middle" font-size="8" class="s">后处理: 去 &lt;think&gt;（兼容推理模型）· 去引号 · 去前缀 · 截断 80 字符</text>
  </g>

  <!-- Arrow down to 成功? -->
  <line x1="250" y1="440" x2="250" y2="470" stroke="#bc8cf2" stroke-width="1.2" class="flow" marker-end="url(#aPurple)"/>

  <!-- Decision: 成功? -->
  <g filter="url(#soft)">
    <polygon points="250,470 350,502 250,534 150,502" fill="var(--amber-fill)" stroke="#d9a73a" stroke-width="1.2"/>
    <text x="250" y="506" text-anchor="middle" font-size="12" font-weight="600" fill="#d9a73a">成功?</text>
  </g>

  <!-- ===== 成功 (左下) ===== -->
  <line x1="150" y1="502" x2="70" y2="502" stroke="#3fb950" stroke-width="1.2"/>
  <line x1="70" y1="502" x2="70" y2="568" stroke="#3fb950" stroke-width="1.2" marker-end="url(#aGreen)"/>
  <text x="106" y="495" font-size="10" fill="#3fb950">成功</text>

  <g filter="url(#soft)">
    <rect x="20" y="568" width="220" height="48" rx="10" fill="var(--green-fill)" stroke="#3fb950" stroke-width="1.4"/>
    <text x="130" y="590" text-anchor="middle" font-size="11" font-weight="600" fill="#3fb950">LLM 生成的名字</text>
    <text x="130" y="606" text-anchor="middle" font-size="9" class="s">覆盖截取名</text>
  </g>

  <!-- ===== 失败 (右下) ===== -->
  <line x1="350" y1="502" x2="430" y2="502" stroke="#d9a73a" stroke-width="1.2"/>
  <line x1="430" y1="502" x2="430" y2="568" stroke="#d9a73a" stroke-width="1.2" marker-end="url(#aAmber)"/>
  <text x="386" y="495" font-size="10" fill="#d9a73a">失败</text>

  <g filter="url(#soft)">
    <rect x="290" y="568" width="280" height="48" rx="10" fill="var(--purple-fill)" stroke="var(--purple-border)"/>
    <text x="430" y="590" text-anchor="middle" font-size="11" font-weight="600" fill="#bc8cf2">截取名留存</text>
    <text x="430" y="606" text-anchor="middle" font-size="9" class="s">用户消息前 50 字符，侧边栏已显示</text>
  </g>

  <!-- 两条路汇合 -->
  <line x1="130" y1="616" x2="130" y2="646" stroke="#3fb950" stroke-width="1.2"/>
  <line x1="130" y1="646" x2="310" y2="646" stroke="#3fb950" stroke-width="1.2" marker-end="url(#aGreen)"/>

  <line x1="430" y1="616" x2="430" y2="646" stroke="#d9a73a" stroke-width="1.2"/>
  <line x1="430" y1="646" x2="370" y2="646" stroke="#d9a73a" stroke-width="1.2" marker-end="url(#aAmber)"/>

  <!-- 写入汇合点 -->
  <g filter="url(#soft)">
    <rect x="310" y="632" width="60" height="28" rx="14" fill="var(--purple-fill)" stroke="#bc8cf2" stroke-width="1.2"/>
    <text x="340" y="650" text-anchor="middle" font-size="9.5" fill="#bc8cf2">写入</text>
  </g>

  <!-- Arrow to shared -->
  <line x1="340" y1="660" x2="340" y2="688" stroke="#bc8cf2" stroke-width="1.2" stroke-dasharray="4 4"/>
  <line x1="340" y1="688" x2="530" y2="688" stroke="#bc8cf2" stroke-width="1.2" stroke-dasharray="4 4" marker-end="url(#aPurple)"/>

  <!-- ============================================================ -->
  <!-- RIGHT: 用户主动操作 — 蓝色 -->
  <!-- ============================================================ -->

  <text x="720" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#58a6ff">用户主动操作（随时，不受幂等限制）</text>

  <!-- 手动改名 -->
  <g filter="url(#soft)">
    <rect x="560" y="92" width="320" height="70" rx="12" fill="var(--blue-fill)" stroke="#58a6ff" stroke-width="1.4"/>
    <text x="720" y="118" text-anchor="middle" font-size="13" font-weight="600" fill="#58a6ff">手动输入名字</text>
    <text x="720" y="138" text-anchor="middle" font-size="9" class="s">UI rename / /rename "新名字" / agent rename 工具</text>
    <text x="720" y="152" text-anchor="middle" font-size="9" class="s">直接写入，不经 LLM</text>
  </g>

  <line x1="640" y1="162" x2="640" y2="662" stroke="#58a6ff" stroke-width="1.2" marker-end="url(#aBlue)"/>

  <!-- 请求 LLM 重新生成 -->
  <g filter="url(#soft)">
    <rect x="560" y="200" width="320" height="70" rx="12" fill="var(--blue-fill)" stroke="#58a6ff" stroke-width="1.4"/>
    <text x="720" y="226" text-anchor="middle" font-size="13" font-weight="600" fill="#58a6ff">请求 LLM 重新生成</text>
    <text x="720" y="246" text-anchor="middle" font-size="9" class="s">/rename（无参数）/ UI 按钮</text>
    <text x="720" y="260" text-anchor="middle" font-size="9" class="s">同步调 _generate_llm_title() → 后处理 → 写入</text>
  </g>

  <line x1="800" y1="270" x2="800" y2="662" stroke="#58a6ff" stroke-width="1.2" marker-end="url(#aBlue)"/>

  <!-- ============================================================ -->
  <!-- SHARED: 写入 + 广播 — 绿色 -->
  <!-- ============================================================ -->

  <g filter="url(#soft)">
    <rect x="530" y="662" width="360" height="50" rx="10" fill="var(--green-fill)" stroke="#3fb950" stroke-width="1.4"/>
    <text x="710" y="683" text-anchor="middle" font-size="12" font-weight="600" fill="#3fb950">写入 + 广播（共享入口）</text>
    <text x="710" y="700" text-anchor="middle" font-size="9" class="s">db.update_session(title=...) → _broadcast(session_updated)</text>
  </g>

  <!-- Arrow to frontend -->
  <line x1="710" y1="712" x2="710" y2="732" stroke="#3fb950" stroke-width="1.2" class="flow" marker-end="url(#aGreen)"/>

  <!-- Frontend -->
  <g filter="url(#soft)">
    <rect x="570" y="732" width="280" height="36" rx="8" fill="var(--green-fill)" stroke="var(--green-border)"/>
    <text x="710" y="754" text-anchor="middle" font-size="11" font-weight="600" fill="#3fb950">前端侧边栏实时更新</text>
  </g>

  <!-- ============================================================ -->
  <!-- Legend -->
  <!-- ============================================================ -->

  <g transform="translate(40, 670)">
    <rect x="0" y="0" width="260" height="90" rx="8" fill="var(--card)" stroke="var(--border)" opacity="0.8"/>
    <text x="15" y="20" font-size="10" font-weight="600" class="t">图例</text>
    <rect x="15" y="32" width="12" height="12" rx="3" fill="var(--purple-fill)" stroke="#bc8cf2"/>
    <text x="34" y="43" font-size="9" fill="#bc8cf2">自动命名（首轮一次性，幂等）</text>
    <rect x="15" y="52" width="12" height="12" rx="3" fill="var(--blue-fill)" stroke="#58a6ff"/>
    <text x="34" y="63" font-size="9" fill="#58a6ff">用户主动（随时，可互覆盖）</text>
    <rect x="15" y="72" width="12" height="12" rx="3" fill="var(--green-fill)" stroke="#3fb950"/>
    <text x="34" y="83" font-size="9" fill="#3fb950">共享写入 + 广播</text>
  </g>

</svg>
