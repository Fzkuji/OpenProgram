<svg viewBox="0 0 1040 460" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif">
<style>
.mono{font-family:'JetBrains Mono','SF Mono',Menlo,Consolas,monospace}
.box{fill:#101d31;stroke:rgba(154,178,204,.45);stroke-width:1.2}
.bt{fill:#d9e5f1;font-size:14px;font-weight:600}
.bs{fill:#8aa0b8;font-size:12px}
.faint{fill:#5f7a90}
.cy{fill:#56d9e9}.am{fill:#f2b544}.vi{fill:#b79bf5}
.ev{fill:rgba(86,217,233,.07);stroke:rgba(86,217,233,.5)}
.st{fill:rgba(183,155,245,.07);stroke:rgba(183,155,245,.5)}
.flow{fill:none;stroke:#56d9e9;stroke-width:1.5;stroke-dasharray:5 7;animation:f 1.4s linear infinite}
.fold{fill:none;stroke:#b79bf5;stroke-width:1.5;stroke-dasharray:5 7;animation:f 1.7s linear infinite}
@keyframes f{to{stroke-dashoffset:-12}}
.arrV{fill:#b79bf5}
</style>
<rect x="0" y="0" width="1040" height="460" rx="16" fill="#0d1828"/>
<g stroke="rgba(154,178,204,.05)"><path d="M0 60H1040M0 120H1040M0 180H1040M0 240H1040M0 300H1040M0 360H1040M0 420H1040"/><path d="M60 0V460M120 0V460M180 0V460M240 0V460M300 0V460M360 0V460M420 0V460M480 0V460M540 0V460M600 0V460M660 0V460M720 0V460M780 0V460M840 0V460M900 0V460M960 0V460"/></g>

<text class="bs mono faint" x="44" y="42" style="letter-spacing:.18em">FOLD = 滚雪球 · 事件一条条过，状况一步步长</text>

<!-- 事件行 -->
<text class="bs cy" x="44" y="86">事件流 →</text>
<rect class="ev" x="130" y="62" width="190" height="56" rx="8"/>
<text class="bt mono cy" x="148" y="86" font-size="12.5">file.changed</text>
<text class="bs" x="148" y="106">改了 auth.py</text>

<rect class="ev" x="380" y="62" width="190" height="56" rx="8"/>
<text class="bt mono cy" x="398" y="86" font-size="12.5">tool.after</text>
<text class="bs" x="398" y="106">bash · <tspan class="am">出错</tspan></text>

<rect class="ev" x="630" y="62" width="190" height="56" rx="8"/>
<text class="bt mono cy" x="648" y="86" font-size="12.5">tool.after</text>
<text class="bs" x="648" y="106">bash · <tspan class="am">又出错</tspan></text>

<rect class="ev" x="880" y="62" width="120" height="56" rx="8" stroke-dasharray="4 5"/>
<text class="bs faint" x="898" y="96">…继续来</text>

<line class="flow" x1="320" y1="90" x2="378" y2="90"/>
<line class="flow" x1="570" y1="90" x2="628" y2="90"/>
<line class="flow" x1="820" y1="90" x2="878" y2="90"/>

<!-- fold 箭头 -->
<g>
  <path class="fold" d="M225 118 C 225 160, 180 180, 150 196"/><polygon class="arrV" points="156,191 142,200 158,205"/>
  <path class="fold" d="M475 118 C 475 160, 430 180, 400 196"/><polygon class="arrV" points="406,191 392,200 408,205"/>
  <path class="fold" d="M725 118 C 725 160, 680 180, 650 196"/><polygon class="arrV" points="656,191 642,200 658,205"/>
</g>
<text class="bs vi" x="500" y="170" text-anchor="middle">每过一条事件，更新一步状况（增量，不重算历史）</text>

<!-- 状态行：雪球 -->
<text class="bs vi" x="44" y="236">State →</text>
<rect class="st" x="44" y="252" width="180" height="74" rx="8"/>
<text class="bs mono" x="60" y="278">改过的文件: {}</text>
<text class="bs mono" x="60" y="300">bash失败: 0</text>
<text class="bs faint" x="60" y="318">（空状况）</text>

<rect class="st" x="294" y="252" width="180" height="74" rx="8"/>
<text class="bs mono" x="310" y="278">{<tspan class="cy">auth.py</tspan>}</text>
<text class="bs mono" x="310" y="300">bash失败: 0</text>

<rect class="st" x="544" y="252" width="180" height="74" rx="8"/>
<text class="bs mono" x="560" y="278">{auth.py}</text>
<text class="bs mono" x="560" y="300">bash失败: <tspan class="am">1</tspan></text>

<rect class="st" x="794" y="252" width="180" height="74" rx="8" stroke="rgba(242,181,68,.55)"/>
<text class="bs mono" x="810" y="278">{auth.py}</text>
<text class="bs mono" x="810" y="300">bash失败: <tspan class="am">2</tspan></text>
<text class="bs am" x="810" y="318" font-size="10.5">规则可据此判断</text>

<line class="fold" x1="224" y1="289" x2="292" y2="289"/>
<line class="fold" x1="474" y1="289" x2="542" y2="289"/>
<line class="fold" x1="724" y1="289" x2="792" y2="289"/>

<!-- 底注 -->
<line x1="44" y1="368" x2="996" y2="368" stroke="rgba(154,178,204,.2)"/>
<text class="bs" x="44" y="402">没有谁手动维护这个计数——<tspan class="vi">状况是事件累加的副产品</tspan>。「连续失败 2 次」这种需要记忆的判断，</text>
<text class="bs" x="44" y="426">规则直接读 State 就有，不用自己造计数器、管清零、防串台。</text>
</svg>
