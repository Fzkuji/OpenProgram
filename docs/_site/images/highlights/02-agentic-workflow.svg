<svg width="1600" height="640" viewBox="0 0 1600 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B9EFF"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3B9EFF" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#3B9EFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#A855F7" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="640" rx="28" fill="#141416"/>
  <rect x="1" y="1" width="1598" height="638" rx="27" fill="none" stroke="#2A2A30" stroke-width="1.5"/>
  <ellipse cx="1120" cy="200" rx="430" ry="300" fill="url(#glow)"/>
  <ellipse cx="1200" cy="500" rx="380" ry="260" fill="url(#glow2)"/>

  <text x="80" y="96" font-family="Geist Mono" font-size="21" fill="#5B5B66" letter-spacing="4">02 / 03</text>

  <text x="78" y="196" font-family="Instrument Sans" font-weight="700" font-size="72" fill="#F5F5F7">Agentic Workflow</text>

  <text x="80" y="258" font-family="Geist Mono" font-size="23" fill="#8A8A96">code orchestrates the LLM to build</text>
  <text x="80" y="312" font-family="Instrument Sans" font-weight="700" font-size="40" fill="url(#bp)">Trustworthy &amp; Self-evolving Agents</text>

  <text x="80" y="392" font-family="Instrument Sans" font-size="25" fill="#B4B4C0">The LLM doesn't free-run — it <tspan font-weight="700" fill="#D2D2DA">proposes a choice</tspan>, and code</text>
  <text x="80" y="428" font-family="Instrument Sans" font-size="25" fill="#B4B4C0">validates it. A bad pick is bounced back to <tspan font-family="Geist Mono" font-size="22" fill="#E0A93B">re-decide</tspan>, so a</text>
  <text x="80" y="464" font-family="Instrument Sans" font-size="25" fill="#B4B4C0">workflow can't skip its own checks.</text>

  <text x="80" y="528" font-family="Instrument Sans" font-size="25" fill="#B4B4C0">And it grows itself: the agent writes an <tspan font-family="Geist Mono" font-size="21" fill="#7FC4FF">@agentic_function</tspan></text>
  <text x="80" y="564" font-family="Instrument Sans" font-size="25" fill="#B4B4C0">with plain file edits, a watcher hot-loads it, and it's a live</text>
  <text x="80" y="600" font-family="Instrument Sans" font-size="25" fill="#B4B4C0">tool on the next turn — no create() / fix() machinery.</text>

  <!-- ===== RIGHT: two stacked diagrams ===== -->

  <!-- ==== TOP: trustworthy — LLM proposes, code gate validates, re-decide ==== -->
  <g transform="translate(892,116)">
    <text x="0" y="0" font-family="Geist Mono" font-size="14" fill="#3B9EFF" letter-spacing="1.5">TRUSTWORTHY · CODE VALIDATES THE CHOICE</text>

    <!-- step 1: decision.make -->
    <g>
      <rect x="0" y="16" width="230" height="44" rx="10" fill="#182430" stroke="#2E4258" stroke-width="1.3"/>
      <text x="16" y="43" font-family="Geist Mono" font-size="15" fill="#D2D8E0">decision.make(options)</text>
    </g>
    <!-- arrow down -->
    <path d="M115 60 L115 78" stroke="url(#bp)" stroke-width="2.4" fill="none"/>
    <polygon points="115,86 110,76 120,76" fill="#7A6FE0"/>

    <!-- step 2: LLM proposes a JSON pick -->
    <g>
      <rect x="0" y="88" width="230" height="46" rx="10" fill="#1B2233" stroke="#4A5A7A" stroke-width="1.3"/>
      <circle cx="24" cy="111" r="7" fill="#3B9EFF"/>
      <text x="42" y="108" font-family="Instrument Sans" font-weight="700" font-size="14" fill="#D2D8E0">LLM proposes</text>
      <text x="42" y="126" font-family="Geist Mono" font-size="13" fill="#8A8A96">{"call": ..., "args": ...}</text>
    </g>
    <path d="M115 134 L115 152" stroke="url(#bp)" stroke-width="2.4" fill="none"/>
    <polygon points="115,160 110,150 120,150" fill="#7A6FE0"/>

    <!-- step 3: CODE GATE -->
    <g>
      <rect x="-14" y="162" width="258" height="70" rx="10" fill="#17241C" stroke="#2E7D5B" stroke-width="2"/>
      <path d="M8 190 l6 7 l11 -14" stroke="#37D399" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="34" y="188" font-family="Geist Mono" font-size="15" fill="#7FE3B8">code gate: validate</text>
      <text x="34" y="212" font-family="Geist Mono" font-size="12" fill="#6E9E82">unknown_call · missing · type · enum</text>
    </g>

    <!-- fail -> re-decide loop (back up to LLM) -->
    <path d="M-14 197 C -64 197, -64 111, -6 111" fill="none" stroke="#E0A93B" stroke-width="2.2" stroke-dasharray="6 5"/>
    <polygon points="-6,111 -16,106 -16,116" fill="#E0A93B"/>
    <text x="-40" y="160" font-family="Geist Mono" font-size="13" fill="#E0A93B" text-anchor="middle" transform="rotate(-90,-40,160)">fail &#8594; re-decide</text>

    <!-- pass -> resolve -->
    <path d="M244 197 L286 197" stroke="#37D399" stroke-width="2.4" fill="none"/>
    <polygon points="294,197 284,192 284,202" fill="#37D399"/>
    <g>
      <rect x="298" y="174" width="196" height="46" rx="10" fill="#182430" stroke="#2E4258" stroke-width="1.3"/>
      <text x="316" y="194" font-family="Instrument Sans" font-weight="700" font-size="14" fill="#D2D8E0">resolve</text>
      <text x="316" y="211" font-family="Geist Mono" font-size="12" fill="#8A8A96">run fn · or return value</text>
    </g>
    <text x="360" y="168" font-family="Geist Mono" font-size="12" fill="#37D399">pass</text>
  </g>

  <!-- ==== BOTTOM: self-evolving hot-load loop ==== -->
  <g transform="translate(892,388)">
    <text x="0" y="0" font-family="Geist Mono" font-size="14" fill="#A855F7" letter-spacing="1.5">SELF-EVOLVING · HOT-LOAD LOOP</text>

    <!-- 4 stages in a row, then loop back -->
    <!-- s1 agent writes -->
    <g>
      <rect x="0" y="16" width="140" height="60" rx="10" fill="#1F1A2E" stroke="#463A5E" stroke-width="1.3"/>
      <text x="13" y="40" font-family="Instrument Sans" font-weight="700" font-size="14" fill="#C9A6FF">agent writes</text>
      <text x="13" y="57" font-family="Geist Mono" font-size="11.5" fill="#8A8A96">Write / Edit</text>
      <text x="13" y="71" font-family="Geist Mono" font-size="10.5" fill="#6E6E7A">@agentic_function</text>
    </g>
    <path d="M140 46 L166 46" stroke="#8A7AB8" stroke-width="2.2" fill="none"/>
    <polygon points="174,46 164,41 164,51" fill="#8A7AB8"/>

    <!-- s2 watcher -->
    <g>
      <rect x="176" y="16" width="140" height="60" rx="10" fill="#182430" stroke="#2E4258" stroke-width="1.3"/>
      <text x="189" y="40" font-family="Instrument Sans" font-weight="700" font-size="14" fill="#9FD0FF">watcher</text>
      <text x="189" y="57" font-family="Geist Mono" font-size="11.5" fill="#8A8A96">2s poll</text>
      <text x="189" y="71" font-family="Geist Mono" font-size="10.5" fill="#6E6E7A">fingerprint change</text>
    </g>
    <path d="M316 46 L342 46" stroke="#5A7A9A" stroke-width="2.2" fill="none"/>
    <polygon points="350,46 340,41 340,51" fill="#5A7A9A"/>

    <!-- s3 rescan -->
    <g>
      <rect x="352" y="16" width="140" height="60" rx="10" fill="#182430" stroke="#2E4258" stroke-width="1.3"/>
      <text x="365" y="40" font-family="Instrument Sans" font-weight="700" font-size="14" fill="#9FD0FF">rescan</text>
      <text x="365" y="57" font-family="Geist Mono" font-size="11.5" fill="#8A8A96">import → register</text>
      <text x="365" y="71" font-family="Geist Mono" font-size="10.5" fill="#6E6E7A">additions only</text>
    </g>
    <path d="M492 46 L518 46" stroke="#5A7A9A" stroke-width="2.2" fill="none"/>
    <polygon points="526,46 516,41 516,51" fill="#5A7A9A"/>

    <!-- s4 live -->
    <g>
      <rect x="528" y="16" width="126" height="60" rx="10" fill="#17241C" stroke="#2E7D5B" stroke-width="1.6"/>
      <text x="541" y="40" font-family="Instrument Sans" font-weight="700" font-size="14" fill="#7FE3B8">live tool</text>
      <text x="541" y="57" font-family="Geist Mono" font-size="11.5" fill="#6E9E82">next turn,</text>
      <text x="541" y="71" font-family="Geist Mono" font-size="11.5" fill="#6E9E82">callable</text>
    </g>

    <!-- loop back: live -> agent writes -->
    <path d="M591 76 C 591 116, 70 116, 70 82" fill="none" stroke="#5AAD4E" stroke-width="2" stroke-dasharray="6 5" opacity="0.8"/>
    <polygon points="70,82 65,92 75,92" fill="#5AAD4E"/>
    <rect x="238" y="98" width="186" height="20" rx="4" fill="#141416"/>
    <text x="331" y="112" font-family="Geist Mono" font-size="12" fill="#6FA463" text-anchor="middle">agent keeps extending itself</text>
  </g>
</svg>
