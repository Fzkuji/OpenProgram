<svg width="1600" height="640" viewBox="0 0 1600 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B9EFF"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3B9EFF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#3B9EFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#A855F7" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="1600" height="640" rx="28" fill="#141416"/>
  <rect x="1" y="1" width="1598" height="638" rx="27" fill="none" stroke="#2A2A30" stroke-width="1.5"/>
  <ellipse cx="1120" cy="250" rx="430" ry="330" fill="url(#glow)"/>
  <ellipse cx="1320" cy="470" rx="360" ry="300" fill="url(#glow2)"/>

  <text x="80" y="96" font-family="Geist Mono" font-size="21" fill="#5B5B66" letter-spacing="4">03 / 03</text>

  <text x="78" y="196" font-family="Instrument Sans" font-weight="700" font-size="66" fill="#F5F5F7">Event Infrastructure</text>

  <text x="80" y="258" font-family="Geist Mono" font-size="23" fill="#8A8A96">a unified event bus — the foundation for</text>
  <text x="80" y="312" font-family="Instrument Sans" font-weight="700" font-size="40" fill="url(#bp)">Proactive Agents</text>

  <text x="80" y="392" font-family="Instrument Sans" font-size="25" fill="#B4B4C0">One process-wide bus. Agent activity and system state alike</text>
  <text x="80" y="428" font-family="Instrument Sans" font-size="25" fill="#B4B4C0">emit onto it; sources and consumers never know each other,</text>
  <text x="80" y="464" font-family="Instrument Sans" font-size="25" fill="#B4B4C0">only the bus. Subscribe to observe (async), or gate</text>
  <text x="80" y="500" font-family="Instrument Sans" font-size="25" fill="#B4B4C0"><tspan font-family="Geist Mono" font-size="22" fill="#E0A93B">tool.before</tspan> to intercept (sync).</text>

  <text x="80" y="564" font-family="Instrument Sans" font-size="25" fill="#B4B4C0">A proactive policy layer is the bus's first intended consumer.</text>
  <text x="80" y="600" font-family="Instrument Sans" font-size="25" fill="#B4B4C0">The plumbing is in place; the proactivity is yours to build.</text>

  <!-- ===== event bus architecture (right) ===== -->
  <g transform="translate(842,86)">

    <!-- ===== A-class sources ===== -->
    <text x="0" y="30" font-family="Geist Mono" font-size="14" fill="#3B9EFF" letter-spacing="1.5">A · AGENT ACTIVITY</text>
    <g>
      <rect x="0" y="42" width="176" height="46" rx="9" fill="#182430" stroke="#2E4258" stroke-width="1.3"/>
      <rect x="12" y="55" width="20" height="20" rx="5" fill="#0E2233" stroke="#3B9EFF" stroke-width="1.2"/>
      <text x="22" y="70" font-family="Geist Mono" font-size="12" font-weight="700" fill="#3B9EFF" text-anchor="middle">A</text>
      <text x="44" y="63" font-family="Instrument Sans" font-weight="700" font-size="16" fill="#D2D8E0">agent loop</text>
      <text x="44" y="81" font-family="Instrument Sans" font-size="12" fill="#7A8A9A">model · tool · file</text>
    </g>
    <g>
      <rect x="0" y="98" width="176" height="46" rx="9" fill="#182430" stroke="#2E4258" stroke-width="1.3"/>
      <rect x="12" y="111" width="20" height="20" rx="5" fill="#0E2233" stroke="#3B9EFF" stroke-width="1.2"/>
      <text x="22" y="126" font-family="Geist Mono" font-size="12" font-weight="700" fill="#3B9EFF" text-anchor="middle">A</text>
      <text x="44" y="119" font-family="Instrument Sans" font-weight="700" font-size="16" fill="#D2D8E0">task runner</text>
      <text x="44" y="137" font-family="Instrument Sans" font-size="12" fill="#7A8A9A">subagent start / end</text>
    </g>

    <!-- ===== B-class sources ===== -->
    <text x="0" y="188" font-family="Geist Mono" font-size="14" fill="#A855F7" letter-spacing="1.5">B · SYSTEM STATE</text>
    <g font-family="Instrument Sans">
      <g>
        <rect x="0" y="200" width="176" height="40" rx="9" fill="#1F1A2E" stroke="#463A5E" stroke-width="1.3"/>
        <rect x="12" y="210" width="20" height="20" rx="5" fill="#241A33" stroke="#A855F7" stroke-width="1.2"/>
        <text x="22" y="225" font-family="Geist Mono" font-size="12" font-weight="700" fill="#A855F7" text-anchor="middle">B</text>
        <text x="44" y="225" font-weight="700" font-size="15" fill="#D2D8E0">auth</text>
        <text x="98" y="225" font-size="12" fill="#7A8A9A">cooldown</text>
      </g>
      <g>
        <rect x="0" y="248" width="176" height="40" rx="9" fill="#1F1A2E" stroke="#463A5E" stroke-width="1.3"/>
        <rect x="12" y="258" width="20" height="20" rx="5" fill="#241A33" stroke="#A855F7" stroke-width="1.2"/>
        <text x="22" y="273" font-family="Geist Mono" font-size="12" font-weight="700" fill="#A855F7" text-anchor="middle">B</text>
        <text x="44" y="273" font-weight="700" font-size="15" fill="#D2D8E0">context</text>
        <text x="112" y="273" font-size="12" fill="#7A8A9A">compact</text>
      </g>
      <g>
        <rect x="0" y="296" width="176" height="40" rx="9" fill="#1F1A2E" stroke="#463A5E" stroke-width="1.3"/>
        <rect x="12" y="306" width="20" height="20" rx="5" fill="#241A33" stroke="#A855F7" stroke-width="1.2"/>
        <text x="22" y="321" font-family="Geist Mono" font-size="12" font-weight="700" fill="#A855F7" text-anchor="middle">B</text>
        <text x="44" y="321" font-weight="700" font-size="15" fill="#D2D8E0">channels</text>
        <text x="118" y="321" font-size="12" fill="#7A8A9A">inbound</text>
      </g>
      <g>
        <rect x="0" y="344" width="176" height="40" rx="9" fill="#1F1A2E" stroke="#463A5E" stroke-width="1.3"/>
        <rect x="12" y="354" width="20" height="20" rx="5" fill="#241A33" stroke="#A855F7" stroke-width="1.2"/>
        <text x="22" y="369" font-family="Geist Mono" font-size="12" font-weight="700" fill="#A855F7" text-anchor="middle">B</text>
        <text x="44" y="369" font-weight="700" font-size="15" fill="#D2D8E0">memory</text>
        <text x="112" y="369" font-size="12" fill="#7A8A9A">idle</text>
      </g>
    </g>

    <!-- ===== emit flow lines into the bus ===== -->
    <text x="196" y="40" font-family="Geist Mono" font-size="13" fill="#6E6E7A">emit(Event)</text>
    <g fill="none" stroke-width="1.8" opacity="0.8">
      <path d="M176 65  C 230 65, 250 200, 300 220" stroke="#3B9EFF"/>
      <path d="M176 121 C 230 121, 255 220, 300 245" stroke="#3B9EFF"/>
      <path d="M176 220 C 230 220, 260 260, 300 268" stroke="#A855F7"/>
      <path d="M176 268 L300 288" stroke="#A855F7"/>
      <path d="M176 316 C 230 316, 260 300, 300 308" stroke="#A855F7"/>
      <path d="M176 364 C 230 364, 250 330, 300 330" stroke="#A855F7"/>
    </g>

    <!-- ===== EventBus core ===== -->
    <g filter="url(#soft)" opacity="0.45"><rect x="300" y="196" width="150" height="164" rx="16" fill="#3B9EFF"/></g>
    <rect x="300" y="196" width="150" height="164" rx="16" fill="#12202E" stroke="url(#bp)" stroke-width="2"/>
    <text x="375" y="248" font-family="Geist Mono" font-weight="700" font-size="20" fill="#7FC4FF" text-anchor="middle">EventBus</text>
    <text x="375" y="274" font-family="Instrument Sans" font-size="13" fill="#8A8A96" text-anchor="middle">process singleton</text>
    <line x1="320" y1="290" x2="430" y2="290" stroke="#2E4258" stroke-width="1"/>
    <text x="375" y="314" font-family="Geist Mono" font-size="13" fill="#9A9AA6" text-anchor="middle">emit()</text>
    <text x="375" y="338" font-family="Geist Mono" font-size="13" fill="#9A9AA6" text-anchor="middle">subscribe(types)</text>

    <!-- ===== observe (async) out ===== -->
    <text x="474" y="176" font-family="Geist Mono" font-size="13" fill="#3B9EFF" letter-spacing="1">OBSERVE · ASYNC</text>
    <g fill="none" stroke="#3B9EFF" stroke-width="1.8" stroke-dasharray="6 7" opacity="0.85">
      <path d="M450 240 C 480 230, 492 205, 522 200"/>
      <path d="M450 300 C 480 300, 492 285, 522 280"/>
    </g>
    <g>
      <rect x="522" y="182" width="200" height="42" rx="9" fill="#182430" stroke="#2E4258" stroke-width="1.3"/>
      <text x="540" y="200" font-family="Instrument Sans" font-weight="700" font-size="15" fill="#D2D8E0">webui server</text>
      <text x="540" y="217" font-family="Instrument Sans" font-size="12" fill="#7A8A9A">forward to WebSocket</text>
    </g>
    <g>
      <rect x="522" y="262" width="200" height="42" rx="9" fill="#1B2233" stroke="#7FC4FF" stroke-width="1.6"/>
      <text x="540" y="280" font-family="Instrument Sans" font-weight="700" font-size="15" fill="#9FD0FF">proactive</text>
      <text x="540" y="297" font-family="Instrument Sans" font-size="12" fill="#8A8A96">first consumer · your policy</text>
    </g>

    <!-- ===== intercept (sync, tool.before) ===== -->
    <text x="474" y="356" font-family="Geist Mono" font-size="13" fill="#E0A93B" letter-spacing="1">INTERCEPT · SYNC</text>
    <path d="M450 335 C 485 360, 495 375, 522 378" fill="none" stroke="#E0A93B" stroke-width="2" stroke-dasharray="4 5"/>
    <path d="M522 402 C 495 408, 470 392, 452 348" fill="none" stroke="#E0A93B" stroke-width="2" stroke-dasharray="4 5" opacity="0.7"/>
    <g>
      <rect x="522" y="366" width="200" height="52" rx="9" fill="#241E12" stroke="#E0A93B" stroke-width="1.4"/>
      <text x="540" y="388" font-family="Geist Mono" font-size="14" fill="#F0C46A">tool.before gate</text>
      <text x="540" y="406" font-family="Instrument Sans" font-size="12" fill="#9A8A6A">block · confirm · allow</text>
    </g>
  </g>
</svg>
