<svg viewBox="0 0 1040 640" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif">
<style>
.mono{font-family:'JetBrains Mono','SF Mono',Menlo,Consolas,monospace}
.box{fill:#101d31;stroke:rgba(154,178,204,.45);stroke-width:1.2}
.bt{fill:#d9e5f1;font-size:15px;font-weight:600}
.bs{fill:#8aa0b8;font-size:12px}
.faint{fill:#5f7a90}
.cy{fill:#56d9e9}.am{fill:#f2b544}.vi{fill:#b79bf5}
.lbl{fill:#8aa0b8;font-size:11.5px}
.flow{fill:none;stroke:#56d9e9;stroke-width:1.6;stroke-dasharray:6 8;animation:f 1.5s linear infinite}
.flowV{fill:none;stroke:#b79bf5;stroke-width:1.6;stroke-dasharray:6 8;animation:f 1.8s linear infinite}
.flowAm{fill:none;stroke:#f2b544;stroke-width:1.8;stroke-dasharray:5 6;animation:f 1s linear infinite}
@keyframes f{to{stroke-dashoffset:-14}}
.arr{fill:#56d9e9}.arrV{fill:#b79bf5}.arrAm{fill:#f2b544}
</style>
<rect x="0" y="0" width="1040" height="640" rx="16" fill="#0d1828"/>
<g stroke="rgba(154,178,204,.05)"><path d="M0 64H1040M0 128H1040M0 192H1040M0 256H1040M0 320H1040M0 384H1040M0 448H1040M0 512H1040M0 576H1040"/><path d="M64 0V640M128 0V640M192 0V640M256 0V640M320 0V640M384 0V640M448 0V640M512 0V640M576 0V640M640 0V640M704 0V640M768 0V640M832 0V640M896 0V640M960 0V640"/></g>

<!-- 事件流 -->
<rect class="box" x="56" y="56" width="500" height="74" rx="10" stroke="rgba(86,217,233,.5)"/>
<text class="bt" x="78" y="84">事件流 <tspan class="bs faint">流水账 · 只往后记，不涂改</tspan></text>
<g class="mono" font-size="12">
  <circle cx="92" cy="108" r="4" fill="#56d9e9"/><text class="bs cy" x="102" y="112">e1</text>
  <circle cx="142" cy="108" r="4" fill="#56d9e9"/><text class="bs cy" x="152" y="112">e2</text>
  <circle cx="192" cy="108" r="4" fill="#56d9e9"/><text class="bs cy" x="202" y="112">e3</text>
  <circle cx="242" cy="108" r="4" fill="#56d9e9"/><text class="bs cy" x="252" y="112">e4</text>
  <circle cx="292" cy="108" r="4" fill="rgba(86,217,233,.4)"/><text class="bs faint" x="302" y="112">…不断变长</text>
  <line x1="92" y1="108" x2="290" y2="108" stroke="rgba(86,217,233,.3)"/>
</g>

<!-- fold → State -->
<path class="flow" d="M556 92 C 640 92, 660 92, 718 92"/>
<polygon class="arr" points="718,86 730,92 718,98"/>
<text class="lbl cy" x="590" y="78">fold 累加（滚雪球）</text>
<rect class="box" x="732" y="56" width="252" height="120" rx="10"/>
<text class="bt" x="754" y="84">State <tspan class="bs faint">当前状况</tspan></text>
<text class="bs mono" x="754" y="110">改过的文件: {auth.py}</text>
<text class="bs mono" x="754" y="130">bash 连续失败: 2</text>
<text class="bs mono" x="754" y="150">本轮有验证动作: false</text>

<!-- 新事件 → 规则 -->
<path class="flow" d="M306 130 C 306 200, 380 230, 432 252"/>
<polygon class="arr" points="427,247 442,256 431,262"/>
<text class="lbl" x="318" y="200">新事件来了，唤起订阅它的规则</text>

<!-- State → 规则 -->
<path class="flowV" d="M858 176 C 858 230, 720 240, 640 254"/>
<polygon class="arrV" points="644,248 630,257 645,262"/>
<text class="lbl vi" x="760" y="218">规则读它</text>

<!-- 规则们 -->
<rect class="box" x="380" y="252" width="300" height="108" rx="12" stroke="rgba(86,217,233,.55)"/>
<text class="bt mono cy" x="530" y="288" text-anchor="middle" font-size="18">规则们 · Policy</text>
<text class="bs" x="530" y="314" text-anchor="middle">每条规则：盯某类事件 + 读 State</text>
<text class="bs" x="530" y="334" text-anchor="middle">evaluate(event, state) → 动作 或 None</text>

<!-- 分流 -->
<path class="flowAm" d="M448 360 C 400 400, 360 416, 320 436"/>
<polygon class="arrAm" points="324,430 310,440 326,444"/>
<path class="flow" d="M612 360 C 660 400, 700 416, 740 436"/>
<polygon class="arr" points="734,430 750,440 732,444"/>
<text class="lbl" x="500" y="404" text-anchor="middle">返回一个动作</text>

<!-- 挡路的 -->
<rect class="box" x="96" y="440" width="380" height="84" rx="10" stroke="rgba(242,181,68,.55)"/>
<text class="bt" x="118" y="468">挡路的 <tspan class="bs mono am">gate · 同步 · 必须快</tspan></text>
<text class="bs" x="118" y="492">在事情发生之前拦住</text>
<text class="bs am" x="118" y="512">拦下 / 放行 / 问用户</text>

<!-- 旁观的 -->
<rect class="box" x="564" y="440" width="380" height="84" rx="10" stroke="rgba(86,217,233,.45)"/>
<text class="bt" x="586" y="468">旁观的 <tspan class="bs mono cy">observer · 异步 · 可慢</tspan></text>
<text class="bs" x="586" y="492">在事情发生之后看着，不耽误 agent</text>
<text class="bs cy" x="586" y="512">提醒用户 / 给模型注入一句话 / 后台默默做准备</text>

<!-- 落地 -->
<path class="flowAm" d="M286 524 C 286 552, 360 562, 420 568"/>
<path class="flow" d="M754 524 C 754 552, 680 562, 620 568"/>
<rect class="box" x="380" y="556" width="300" height="48" rx="24"/>
<text class="bt" x="530" y="585" text-anchor="middle" font-size="14">框架去落地：弹窗 · 拦截 · 注入 · 起后台任务</text>
</svg>
