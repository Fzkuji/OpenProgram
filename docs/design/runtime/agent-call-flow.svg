idth="1.3"/><circle cx="574.0" cy="504.0" r="11" fill="#8250df"/><text x="574.0" y="508.0" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">4</text><text x="594.0" y="501.0" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" fill="#1f2328" text-anchor="start" font-weight="bold">压缩预算把关</text><text x="594.0" y="518.0" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10.5" fill="#656d76" text-anchor="start" font-weight="normal">超预算则把早期历史压成摘要（共享，非聊天专属）</text><rect x="540.0" y="584" width="560" height="160" rx="14" fill="#faf0ff" stroke="#8250df" stroke-width="2.6"/><text x="820.0" y="612" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="16" fill="#1f2328" text-anchor="middle" font-weight="bold">② open_call_node（开节点）</text><rect x="554.0" y="628" width="532" height="44" rx="8" fill="#ffffff" stroke="#8250df" stroke-width="1.3"/><circle cx="574.0" cy="650.0" r="11" fill="#8250df"/><text x="574.0" y="654.0" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">1</text><text x="594.0" y="647.0" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" fill="#1f2328" text-anchor="start" font-weight="bold">写一个 llm 节点</text><text x="594.0" y="664.0" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10.5" fill="#656d76" text-anchor="start" font-weight="normal">role=llm，status=running（占位，先落盘）</text><path d="M 574.0 672 L 574.0 682" stroke="#8250df" stroke-width="1.4"/><rect x="554.0" y="682" width="532" height="44" rx="8" fill="#ffffff" stroke="#8250df" stroke-width="1.3"/><circle cx="574.0" cy="704.0" r="11" fill="#8250df"/><text x="574.0" y="708.0" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">2</text><text x="594.0" y="701.0" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" fill="#1f2328" text-anchor="start" font-weight="bold">_call_id 指向它</text><text x="594.0" y="718.0" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10.5" fill="#656d76" text-anchor="start" font-weight="normal">后续工具的 code 节点 called_by = 这个 llm 节点</text><path d="M 820.0 544 L 820.0 584" stroke="#57606a" stroke-width="2.6" fill="none" marker-end="url(#a)"/><rect x="540.0" y="784" width="560" height="268" rx="14" fill="#eafbef" stroke="#1a7f37" stroke-width="2.6"/><text x="820.0" y="812" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="16" fill="#1f2328" text-anchor="middle" font-weight="bold">③ agent_loop（共享引擎·循环）</text><rect x="554.0" y="828" width="532" height="44" rx="8" fill="#ffffff" stroke="#1a7f37" stroke-width="1.3"/><circle cx="574.0" cy="850.0" r="11" fill="#1a7f37"/><text x="574.0" y="854.0" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">1</text><text x="594.0" y="847.0" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" fill="#1f2328" text-anchor="start" font-weight="bold">调大模型 / 流式</text><text x="594.0" y="864.0" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10.5" fill="#656d76" text-anchor="start" font-weight="normal">把上下文发给模型，流式收回复</text><path d="M 574.0 872 L 574.0 882" stroke="#1a7f37" stroke-width="1.4"/><rect x="554.0" y="882" width="532" height="44" rx="8" fill="#ffffff" stroke="#1a7f37" stroke-width="1.3"/><circle cx="574.0" cy="904.0" r="11" fill="#1a7f37"/><text x="574.0" y="908.0" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">2</text><text x="594.0" y="901.0" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" fill="#1f2328" text-anchor="start" font-weight="bold">回复有 tool_use？</text><text x="594.0" y="918.0" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10.5" fill="#656d76" text-anchor="start" font-weight="normal">有→执行工具；没有(纯文本)→跳到结束</text><path d="M 574.0 926 L 574.0 936" stroke="#1a7f37" stroke-width="1.4"/><rect x="554.0" y="936" width="532" height="44" rx="8" fill="#ffffff" stroke="#1a7f37" stroke-width="1.3"/><circle cx="574.0" cy="958.0" r="11" fill="#1a7f37"/><text x="574.0" y="962.0" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">3</text><text x="594.0" y="955.0" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" fill="#1f2328" text-anchor="start" font-weight="bold">执行工具</text><text x="594.0" y="972.0" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10.5" fill="#656d76" text-anchor="start" font-weight="normal">_execute_tool_calls；工具是 @agentic_function 则体内再调 exec(嵌套)</text><path d="M 574.0 980 L 574.0 990" stroke="#1a7f37" stroke-width="1.4"/><rect x="554.0" y="990" width="532" height="44" rx="8" fill="#ffffff" stroke="#1a7f37" stroke-width="1.3"/><circle cx="574.0" cy="1012.0" r="11" fill="#1a7f37"/><text x="574.0" y="1016.0" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">4</text><text x="594.0" y="1009.0" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" fill="#1f2328" text-anchor="start" font-weight="bold">结果喂回 → 再调</text><text x="594.0" y="1026.0" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10.5" fill="#656d76" text-anchor="start" font-weight="normal">工具结果拼回上下文，回到“调大模型”；直到纯文本</text><path d="M 820.0 744 L 820.0 784" stroke="#57606a" stroke-width="2.6" fill="none" marker-end="url(#a)"/><rect x="540.0" y="1092" width="560" height="160" rx="14" fill="#faf0ff" stroke="#8250df" stroke-width="2.6"/><text x="820.0" y="1120" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="16" fill="#1f2328" text-anchor="middle" font-weight="bold">④ close_call_node（关节点）</text><rect x="554.0" y="1136" width="532" height="44" rx="8" fill="#ffffff" stroke="#8250df" stroke-width="1.3"/><circle cx="574.0" cy="1158.0" r="11" fill="#8250df"/><text x="574.0" y="1162.0" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">1</text><text x="594.0" y="1155.0" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" fill="#1f2328" text-anchor="start" font-weight="bold">回填 output</text><text x="594.0" y="1172.0" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10.5" fill="#656d76" text-anchor="start" font-weight="normal">把最终回复写进②开的那个 llm 节点</text><path d="M 574.0 1180 L 574.0 1190" stroke="#8250df" stroke-width="1.4"/><rect x="554.0" y="1190" width="532" height="44" rx="8" fill="#ffffff" stroke="#8250df" stroke-width="1.3"/><circle cx="574.0" cy="1212.0" r="11" fill="#8250df"/><text x="574.0" y="1216.0" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">2</text><text x="594.0" y="1209.0" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" fill="#1f2328" text-anchor="start" font-weight="bold">写字段 + 终态</text><text x="594.0" y="1226.0" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10.5" fill="#656d76" text-anchor="start" font-weight="normal">token列/blocks/usage + status=success/cancelled/error</text><path d="M 820.0 1052 L 820.0 1092" stroke="#57606a" stroke-width="2.6" fill="none" marker-end="url(#a)"/><path d="M 370.0 222 L 370.0 249.0 L 750.0 249.0 L 750.0 276" stroke="#0969da" stroke-width="2.6" fill="none" marker-end="url(#a)"/><path d="M 1270.0 222 L 1270.0 249.0 L 890.0 249.0 L 890.0 27