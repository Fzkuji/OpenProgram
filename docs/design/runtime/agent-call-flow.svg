<rect x="0" y="0" width="1760" height="1560" rx="0" fill="#ffffff" stroke="#ffffff" stroke-width="0"/><text x="40" y="46" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="26" fill="#1f2328" text-anchor="start" font-weight="bold">OpenProgram — 代码运行逻辑（统一后 · 完整流程）</text><text x="40" y="72" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" fill="#656d76" text-anchor="start" font-weight="normal">两入口汇到一条主干；重试 / 审批 / 嵌套都画成真实流程（判断 + 分支 + 回环），不是挂在旁边的注释。</text><rect x="40" y="96" width="18" height="18" rx="5" fill="#faf0ff" stroke="#8250df" stroke-width="1.6"/><text x="66" y="110" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#1f2328" text-anchor="start" font-weight="bold">主干步骤</text><text x="66" y="127" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" fill="#656d76" text-anchor="start" font-weight="normal">顺序执行</text><rect x="250" y="96" width="18" height="18" rx="5" fill="#eafbef" stroke="#1a7f37" stroke-width="1.6"/><text x="276" y="110" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#1f2328" text-anchor="start" font-weight="bold">引擎/工具</text><text x="276" y="127" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" fill="#656d76" text-anchor="start" font-weight="normal">agent_loop 内</text><rect x="470" y="96" width="18" height="18" rx="5" fill="#ffeff7" stroke="#bf3989" stroke-width="1.6"/><text x="496" y="110" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#1f2328" text-anchor="start" font-weight="bold">判断</text><text x="496" y="127" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" fill="#656d76" text-anchor="start" font-weight="normal">菱形=分支点</text><rect x="640" y="96" width="18" height="18" rx="5" fill="#ddf4ff" stroke="#0969da" stroke-width="1.6"/><text x="666" y="110" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#1f2328" text-anchor="start" font-weight="bold">入口</text><text x="666" y="127" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" fill="#656d76" text-anchor="start" font-weight="normal">触发源</text><rect x="70" y="150" width="560" height="58" rx="10" fill="#ddf4ff" stroke="#0969da" stroke-width="1.8"/><text x="350.0" y="174" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" fill="#1f2328" text-anchor="middle" font-weight="bold">入口A · 用户消息（webui/CLI/channel）</text><text x="350.0" y="193" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#656d76" text-anchor="middle" font-weight="normal">run_turn</text><rect x="1130" y="150" width="560" height="58" rx="10" fill="#ddf4ff" stroke="#0969da" stroke-width="1.8"/><text x="1410.0" y="174" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" fill="#1f2328" text-anchor="middle" font-weight="bold">入口B · @agentic_function 体内 / decision.make</text><text x="1410.0" y="193" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#656d76" text-anchor="middle" font-weight="normal">runtime.exec</text><rect x="600.0" y="260" width="560" height="170" rx="12" fill="#faf0ff" stroke="#8250df" stroke-width="2.2"/><text x="880.0" y="284" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" fill="#1f2328" text-anchor="middle" font-weight="bold">① 读上下文（组装这次输入）</text><rect x="614.0" y="304" width="532" height="30" rx="7" fill="#fff" stroke="#8250df" stroke-width="1.2"/><circle cx="630.0" cy="319" r="9" fill="#8250df"/><text x="630.0" y="323" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">1</text><text x="646.0" y="317" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" fill="#1f2328" text-anchor="start" font-weight="bold">compute_reads(整张 ROOT 图)</text><text x="646.0" y="330" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="9.5" fill="#656d76" text-anchor="start" font-weight="normal">选这次该看的节点：聊天累加/函数 frame+expose 弹出</text><rect x="614.0" y="337" width="532" height="30" rx="7" fill="#fff" stroke="#8250df" stroke-width="1.2"/><circle cx="630.0" cy="352" r="9" fill="#8250df"/><text x="630.0" y="356" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">2</text><text x="646.0" y="350" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" fill="#1f2328" text-anchor="start" font-weight="bold">render 成 messages</text><text x="646.0" y="363" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="9.5" fill="#656d76" text-anchor="start" font-weight="normal">节点→provider 消息（内容含文本/图片/文件）</text><rect x="614.0" y="370" width="532" height="30" rx="7" fill="#fff" stroke="#8250df" stroke-width="1.2"/><circle cx="630.0" cy="385" r="9" fill="#8250df"/><text x="630.0" y="389" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">3</text><text x="646.0" y="383" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" fill="#1f2328" text-anchor="start" font-weight="bold">拼统一 system prompt</text><text x="646.0" y="396" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="9.5" fill="#656d76" text-anchor="start" font-weight="normal">全项目一个：身份+记忆+统一工具+skills（前缀恒定→缓存命中）</text><rect x="614.0" y="403" width="532" height="30" rx="7" fill="#fff" stroke="#8250df" stroke-width="1.2"/><circle cx="630.0" cy="418" r="9" fill="#8250df"/><text x="630.0" y="422" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">4</text><text x="646.0" y="416" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" fill="#1f2328" text-anchor="start" font-weight="bold">压缩预算把关</text><text x="646.0" y="429" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="9.5" fill="#656d76" text-anchor="start" font-weight="normal">超预算→早期历史压成摘要</text><path d="M 350.0 208 L 350.0 234.0 L 810.0 234.0 L 810.0 260" stroke="#0969da" stroke-width="2.6" fill="none" marker-end="url(#a)"/><path d="M 1410.0 208 L 1410.0 234.0 L 950.0 234.0 L 950.0 260" stroke="#0969da" stroke-width="2.6" fill="none" marker-end="url(#a)"/><text x="880.0" y="250" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#bf3989" text-anchor="middle" font-weight="bold">两入口汇到同一条主干（含统一 system）</text><rect x="600.0" y="474" width="560" height="58" rx="12" fill="#faf0ff" stroke="#8250df" stroke-width="2.2"/><text x="880.0" y="498" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" fill="#1f2328" text-anchor="middle" font-weight="bold">② open_call_node</text><text x="880.0" y="516" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#656d76" text-anchor="middle" font-weight="normal">开 llm 节点(running) · _call_id 指向它（工具的 code 节点都 called_by 它）</text><path d="M 880.0 430 L 880.0 474" stroke="#57606a" stroke-width="2.6" fill="none" marker-end="url(#a)"/><rect x="600.0" y="582" width="560" height="46" rx="12" fill="#eafbef" stroke="#1a7f37" stroke-width="2.2"/><text x="880.0" y="606" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" fill="#1f2328" text-anchor="middle" font-weight="bold">③ agent_loop（共享引擎 · 循环）</text><path d="M 880.0 532 L 880.0 582" stroke="#57606a" stroke-width="2.6" fill="none" marker-end="url(#a)"/><rect x="640.0" y="662" width="480" height="52" rx="12" fill="#eafbef" stroke="#1a7f37" stroke-width="2.2"/><circle cx="664.0" cy="686" r="13" fill="#1a7f37"/><text x="664.0" y="691" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold">1</text><text x="686.0" y="684" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" fill="#1f2328" text-anchor="start" font-weight="bold">调大模型 / 流式</text><text x="686.0" y="702" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#656d76" text-anchor="start" font-weight="normal">把上下文发给模型，流式收回复</text><path d="M 880.0 628 L 880.0 662" stroke="#57606a" stroke-width="2.6" fill="none" marker-end="url(#a)"/><polygon points="530.0,648 592.0,688 530.0,728 468.0,688" fill="#ffeff7" stroke="#bf3989" stroke-width="2"/><text x="530.0" y="684" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" fill="#1f2328" text-anchor="middle" font-weight="bold">出错?</text><text x="530.0" y="701" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" fill="#656d76" text-anchor="middle" font-weight="normal">可重试?</text><path d="M 640.0 688 L 592.0 688" stroke="#57606a" stroke-width="2" fill="none" marker-end="url(#a)"/><text x="622.0" y="684.0" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#bf3989" text-anchor="middle" font-weight="bold">失败</text><path d="M 530.0 728 L 530.0 812 L 880.0 812 L 880.0 714" stroke="#bf3989" stroke-width="2.2" fill="none" stroke-dasharray="6 4" marker-end="url(#a)"/><rect x="452.0" y="754" width="156" height="40" rx="8" fill="#ffeff7" stroke="#bf3989" stroke-width="1.6"/><text x="535.0" y="776" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10.5" fill="#1f2328" text-anchor="middle" font-weight="bold">退避+jitter 重跑</text><text x="535.0" y="790" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="9.5" fill="#656d76" text-anchor="middle" font-weight="normal">是 · attempt&lt;max</text><path d="M 530.0 648 L 530.0 618" stroke="#bf3989" stroke-width="2" fill="none" marker-end="url(#a)"/><rect x="458.0" y="5