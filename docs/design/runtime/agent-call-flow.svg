ermission)</text><path d="M 880.0 824 L 880.0 848" stroke="#57606a" stroke-width="2.6" fill="none" marker-end="url(#a)"/><text x="886.0" y="832.0" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#bf3989" text-anchor="middle" font-weight="bold">是</text><path d="M 800.0 888 L 556.0 888" stroke="#57606a" stroke-width="2" fill="none" marker-end="url(#a)"/><text x="684.0" y="884.0" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#bf3989" text-anchor="middle" font-weight="bold">要·等用户</text><rect x="380.0" y="854" width="176" height="68" rx="10" fill="#ffeff7" stroke="#bf3989" stroke-width="1.6"/><text x="468.0" y="876" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" fill="#1f2328" text-anchor="middle" font-weight="bold">等审批</text><text x="468.0" y="896" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" fill="#656d76" text-anchor="middle" font-weight="normal">批准→继续</text><text x="468.0" y="914" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" fill="#656d76" text-anchor="middle" font-weight="normal">拒绝→错误回模型</text><rect x="640.0" y="982" width="480" height="52" rx="12" fill="#eafbef" stroke="#1a7f37" stroke-width="2.2"/><circle cx="664.0" cy="1006" r="13" fill="#1a7f37"/><text x="664.0" y="1011" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold">2</text><text x="686.0" y="1004" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" fill="#1f2328" text-anchor="start" font-weight="bold">执行工具 _execute_tool_calls</text><text x="686.0" y="1022" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#656d76" text-anchor="start" font-weight="normal">写 code 节点(called_by=当前 llm)；批准后/无需审批则跑</text><path d="M 880.0 928 L 880.0 982" stroke="#57606a" stroke-width="2.6" fill="none" marker-end="url(#a)"/><text x="886.0" y="951.0" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#bf3989" text-anchor="middle" font-weight="bold">不需/已批</text><polygon points="880.0,1048 970.0,1088 880.0,1128 790.0,1088" fill="#ffeff7" stroke="#bf3989" stroke-width="2"/><text x="880.0" y="1084" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" fill="#1f2328" text-anchor="middle" font-weight="bold">工具是</text><text x="880.0" y="1101" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" fill="#656d76" text-anchor="middle" font-weight="normal">@agentic_function?</text><path d="M 880.0 1034 L 880.0 1048" stroke="#57606a" stroke-width="2.6" fill="none" marker-end="url(#a)"/><path d="M 970.0 1088 L 1240.0 1088 L 1240.0 256 L 950.0 256" stroke="#1a7f37" stroke-width="2.4" fill="none" stroke-dasharray="7 5" marker-end="url(#ag)"/><text x="1250.0" y="1080" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#1a7f37" text-anchor="start" font-weight="bold">是 → 体内再调 exec</text><text x="1250.0" y="1096" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10.5" fill="#656d76" text-anchor="start" font-weight="normal">= 回到 ① 主干顶（嵌套）</text><text x="1250.0" y="1112" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" fill="#656d76" text-anchor="start" font-weight="normal">用同一 system，缓存继续命中</text><text x="1250.0" y="1128" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" fill="#656d76" text-anchor="start" font-weight="normal">wiki_agent 递归即此</text><rect x="640.0" y="1172" width="480" height="46" rx="12" fill="#eafbef" stroke="#1a7f37" stroke-width="2.2"/><circle cx="664.0" cy="1196" r="13" fill="#1a7f37"/><text x="664.0" y="1201" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold">3</text><text x="686.0" y="1194" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" fill="#1f2328" text-anchor="start" font-weight="bold">结果喂回 → 回到“调大模型”</text><text x="686.0" y="1212" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#656d76" text-anchor="start" font-weight="normal">否：普通工具直接出结果，拼回上下文继续循环</text><path d="M 880.0 1128 L 880.0 1172" stroke="#57606a" stroke-width="2.6" fill="none" marker-end="url(#a)"/><text x="886.0" y="1146.0" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#bf3989" text-anchor="middle" font-weight="bold">否</text><path d="M 640.0 1195 L 490.0 1195 L 490.0 688 L 452.0 688" stroke="#1a7f37" stroke-width="2.2" fill="none" stroke-dasharray="6 4" marker-end="url(#a)"/><text x="470.0" y="1216" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10.5" fill="#1a7f37" text-anchor="start" font-weight="bold">循环回去（结果喂回上一步）</text><rect x="600.0" y="1274" width="560" height="58" rx="12" fill="#faf0ff" stroke="#8250df" stroke-width="2.2"/><text x="880.0" y="1298" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" fill="#1f2328" text-anchor="middle" font-weight="bold">④ close_call_node</text><text x="880.0" y="1316" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#656d76" text-anchor="middle" font-weight="normal">回填 output 到②的 llm 节点 · 写 token列/blocks/usage · status=success/cancelled/error</text><path d="M 1215.0 806 L 1215.0 1254 L 1160.0 1274" stroke="#57606a" stroke-width="2.4" fill="none" marker-end="url(#a)"/><rect x="370.0" y="568" width="1380.0" height="706" rx="16" fill="none" stroke="#9a6700" stroke-width="2" stroke-dasharray="9 6"/><text x="380.0" y="560" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#9a6700" text-anchor="start" font-weight="bold">外壳（包住整个调用周期）：timeout 计时 · 取消信号随时中断 · usage 计量累加 · 出错→close(status=error)</text>
