<rect x="0" y="0" width="1640" height="1560" rx="0" fill="#ffffff" stroke="#ffffff" stroke-width="0"/><text x="40" y="46" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="26" fill="#1f2328" text-anchor="start" font-weight="bold">OpenProgram — 代码运行逻辑（统一后 · 目标）</text><text x="40" y="72" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" fill="#656d76" text-anchor="start" font-weight="normal">两入口汇到一条主干；每个主干步骤展开成内部小步骤。各入口特殊处理是挂主干旁的可选钩子。</text><rect x="40" y="96" width="18" height="18" rx="5" fill="#ddf4ff" stroke="#0969da" stroke-width="1.6"/><text x="66" y="110" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#1f2328" text-anchor="start" font-weight="bold">入口</text><text x="66" y="127" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" fill="#656d76" text-anchor="start" font-weight="normal">两个触发源</text><rect x="230" y="96" width="18" height="18" rx="5" fill="#faf0ff" stroke="#8250df" stroke-width="1.6"/><text x="256" y="110" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#1f2328" text-anchor="start" font-weight="bold">主干</text><text x="256" y="127" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" fill="#656d76" text-anchor="start" font-weight="normal">统一一条路径</text><rect x="430" y="96" width="18" height="18" rx="5" fill="#fff8e6" stroke="#9a6700" stroke-width="1.6"/><text x="456" y="110" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#1f2328" text-anchor="start" font-weight="bold">钩子</text><text x="456" y="127" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" fill="#656d76" text-anchor="start" font-weight="normal">有就执行,没有跳过</text><rect x="660" y="96" width="18" height="18" rx="5" fill="#eafbef" stroke="#1a7f37" stroke-width="1.6"/><text x="686" y="110" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#1f2328" text-anchor="start" font-weight="bold">引擎</text><text x="686" y="127" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" fill="#656d76" text-anchor="start" font-weight="normal">agent_loop 共享</text><rect x="60" y="156" width="620" height="66" rx="10" fill="#ddf4ff" stroke="#0969da" stroke-width="1.8"/><text x="370.0" y="183" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" fill="#1f2328" text-anchor="middle" font-weight="bold">入口 A · 用户消息（webui / CLI / channel）</text><text x="370.0" y="204" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#656d76" text-anchor="middle" font-weight="normal">run_turn（原 process_user_turn）</text><rect x="960" y="156" width="620" height="66" rx="10" fill="#ddf4ff" stroke="#0969da" stroke-width="1.8"/><text x="1270.0" y="183" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" fill="#1f2328" text-anchor="middle" font-weight="bold">入口 B · @agentic_function 体内 / decision.make</text><text x="1270.0" y="204" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#656d76" text-anchor="middle" font-weight="normal">runtime.exec</text><rect x="540.0" y="276" width="560" height="268" rx="14" fill="#faf0ff" stroke="#8250df" stroke-width="2.6"/><text x="820.0" y="304" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="16" fill="#1f2328" text-anchor="middle" font-weight="bold">① 读上下文（组装这次的输入）</text><rect x="554.0" y="320" width="532" height="44" rx="8" fill="#ffffff" stroke="#8250df" stroke-width="1.3"/><circle cx="574.0" cy="342.0" r="11" fill="#8250df"/><text x="574.0" y="346.0" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">1</text><text x="594.0" y="339.0" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" fill="#1f2328" text-anchor="star