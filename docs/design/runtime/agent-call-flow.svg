<rect x="0" y="0" width="1480" height="1180" rx="0" fill="#ffffff" stroke="#ffffff" stroke-width="0"/><text x="40" y="46" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="26" fill="#1f2328" text-anchor="start" font-weight="bold">OpenProgram — 代码运行逻辑（统一后 · 目标）</text><text x="40" y="72" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" fill="#656d76" text-anchor="start" font-weight="normal">聊天(dispatcher)和函数体内(runtime.exec)合并成一条主干；各入口的特殊处理是挂在主干上的可选钩子。</text><rect x="40" y="96" width="18" height="18" rx="5" fill="#ddf4ff" stroke="#0969da" stroke-width="1.6"/><text x="66" y="110" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#1f2328" text-anchor="start" font-weight="bold">入口</text><text x="66" y="127" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" fill="#656d76" text-anchor="start" font-weight="normal">两个触发源</text><rect x="230" y="96" width="18" height="18" rx="5" fill="#fbefff" stroke="#8250df" stroke-width="1.6"/><text x="256" y="110" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#1f2328" text-anchor="start" font-weight="bold">主干</text><text x="256" y="127" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" fill="#656d76" text-anchor="start" font-weight="normal">统一一条路径</text><rect x="430" y="96" width="18" height="18" rx="5" fill="#fff8e6" stroke="#9a6700" stroke-width="1.6"/><text x="456" y="110" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#1f2328" text-anchor="start" font-weight="bold">钩子</text><text x="456" y="127" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" fill="#656d76" text-anchor="start" font-weight="normal">有就执行,没有跳过</text><rect x="660" y="96" width="18" height="18" rx="5" fill="#dafbe1" stroke="#1a7f37" stroke-width="1.6"/><text x="686" y="110" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#1f2328" text-anchor="start" font-weight="bold">引擎</text><text x="686" y="127" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" fill="#656d76" text-anchor="start" font-weight="normal">agent_loop 共享</text><rect x="60" y="160" width="560" height="70" rx="10" fill="#ddf4ff" stroke="#0969da" stroke-width="1.8"/><text x="340.0" y="188" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" fill="#1f2328" text-anchor="middle" font-weight="bold">入口 A · 用户消息（webui / CLI / channel）</text><text x="340.0" y="210" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#656d76" text-anchor="middle" font-weight="normal">run_turn（原 process_user_turn）· turn 管理</text><rect x="860" y="160" width="560" height="70" rx="10" fill="#ddf4ff" stroke="#0969da" stroke-width="1.8"/><text x="1140.0" y="188" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" fill="#1f2328" text-anchor="middle" font-weight="bold">入口 B · @agentic_function 体内 / decision.make</text><text x="1140.0" y="210" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#656d76" text-anchor="middle" font-weight="normal">runtime.exec</text><rect x="510.0" y="290" width="460" height="108" rx="12" fill="#fbefff" stroke="#8250df" stroke-width="2.4"/><text x="740.0" y="318" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="15" fill="#1f2328" text-anchor="middle" font-weight="bold">① 读上下文 + 统一 system</text><text x="740.0" y="338" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10.5" fill="#656d76" text-anchor="middle" font-weight="normal">compute_reads（整张 ROOT 图）→ render</text><text x="740.0" y="354" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10.5" fill="#656d76" text-anchor="middle" font-weight="normal">+ 全项目统一 system prompt（身份+项目记忆+统一工具+skills，前缀恒定→缓存命中）</text><text x="740.0" y="370" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10.5" fill="#656d76" text-anchor="middle" font-weight="normal">+ 压缩预算把关（共享）</text><rect x="510.0" y="432" width="460" height="70" rx="12" fill="#fbefff" stroke="#8250df" stroke-width="2.4"/><text x="740.0" y="460" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="15" fill="#1f2328" text-anchor="middle" font-weight="bold">② open_call_node</text><text x="740.0" y="480" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10.5" fill="#656d76" text-anchor="middle" font-weight="normal">开一个 llm 节点（status=running，_call_id→它）</text><path d="M 740.0 398 L 740.0 432" stroke="#57606a" stroke-width="2.4" fill="none" marker-end="url(#a)"/><rect x="510.0" y="536" width="460" height="86" rx="12" fill="#dafbe1" stroke="#1a7f37" stroke-width="2.4"/><text x="740.0" y="564" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="15" fill="#1f2328" text-anchor="middle" font-weight="bold">③ agent_loop（共享引擎）</text><text x="740.0" y="584" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10.5" fill="#656d76" text-anchor="middle" font-weight="normal">调大模型 / 流式 → 回复有 tool_use？</text><text x="740.0" y="600" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10.5" fill="#656d76" text-anchor="middle" font-weight="normal">执行工具 → 结果喂回 → 再调；纯文本→结束</text><path d="M 740.0 502 L 740.0 536" stroke="#57606a" stroke-width="2.4" fill="none" marker-end="url(#a)"/><rect x="510.0" y="656" width="460" height="70" rx="12" fill="#fbefff" stroke="#8250df" stroke-width="2.4"/><text x="740.0" y="684" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="15" fill="#1f2328" text-anchor="middle" font-weight="bold">④ close_call_node</text><text x="740.0" y="704" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10.5" fill="#656d76" text-anchor="middle" font-weight="normal">回填 output + 字段 + 终态（success/cancelled/error）</text><path d="M 740.0 622 L 740.0 656" stroke="#57606a" stroke-width="2.4" fill="none" marker-end="url(#a)"/><path d="M 340.0 230 L 340.0 260.0 L 680.0 260.0 L 680.0 290" stroke="#0969da" stroke-width="2.4" fill="none" marker-end="url(#a)"/><path d="M 1140.0 230 L 1140.0 260.0 L 800.0 260.0 L 800.0 290" stroke="#0969da" stroke-width="2.4" fill="none" marker-end="url(#a)"/><text x="740.0" y="278" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#bf3989" text-anchor="middle" font-weight="bold">两个入口汇到同一条主干（system prompt 也统一，不分两套）</text><path d="M 970.0 579.0 C 1120.0 579.0 1120.0 290 800.0 286" stroke="#1a7f37" stroke-width="2.2" fill="none" stroke-dasharray="6 4" marker-end="url(#ag)"/><text x="1130.0" y="542" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#1a7f37" text-anchor="start" font-weight="bold">工具是 @agentic_function？</text><text x="1130.0" y="558" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#1a7f37" text-anchor="start" font-weight="normal">→ 体内再调 exec = 回到主干顶（嵌套）</text><text x="1130.0" y="574" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#656d76" text-anchor="start" font-weight="normal">用同一个统一 system（缓存继续命中）</text><text x="1130.0" y="590" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#656d76" text-anchor="start" font-weight="normal">wiki_agent 递归即此</text><rect x="60" y="650" width="360" height="82" rx="10" fill="#fff8e6" stroke="#9a6700" stroke-width="1.6" stroke-dasharray="5 4"/><text x="72" y="672" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#9a6700" text-anchor="start" font-weight="bold">钩子 · 入口A 聊天专属</text><text x="72" y="692" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" fill="#656d76" text-anchor="start" font-weight="normal">前端流式气泡 / blocks / token 列</text><text x="72" y="708" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" fill="#656d76" text-anchor="start" font-weight="normal">标题 / WebSocket 广播</text><path d="M 420 691.0 L 510.0 691.0" stroke="#9a6700" stroke-width="1.8" fill="none" stroke-dasharray="4 3" marker-end="url(#a)"/><rect x="1060" y="530" width="360" height="98" rx="10" fill="#fff8e6" stroke="#9a6700" stroke-width="1.6" stroke-dasharray="5 4"/><text x="1072" y="552" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#9a6700" text-anchor="start" font-weight="bold">钩子 · 共享（挂在 loop 外）</text><text x="1072" y="572" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" fill="#656d76" text-anchor="start" font-weight="normal">timeout · 重试+jitter · 取消 · usage 计量</text><text x="1072" y="588" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" fill="#656d76" text-anchor="start" font-weight="normal">执行工具前:tool.before 事件 · 审批 gate</text><path d="M 1060 579.0 L 970.0 579.0" stroke="#9a6700" stroke-width="1.8" fill="none" stroke-dasharray="4 3" marker-end="url(#a)"/><rect x="60" y="300" width="360" height="56" rx="10" fill="#fff8e6" stroke="#9a6700" stroke-width="1.6" stroke-dasharray="5 4"/><text x="72" y="320" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#9a6700" text-anchor="start" font-weight="bold">钩子 · 当前调用带附件时</text><text x="72" y="338" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" fill="#656d76" text-anchor="start" font-weight="normal">图片注入（图片不在图节点里）· 函数内通常无</text><path d="M 420 328 L 510.0 328" stroke="#9a6700" stroke-width="1.8" fill="none" stroke-dasharray="4 3" marker-end="url(#a)"/><rect x="40" y="770" width="690.0" height="150" rx="12" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.8"/><text x="60" y="798" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="15" fill="#1a7f37" text-anchor="start" font-weight="bold">现状已共享（不用改）</text><text x="60" y="824" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#1f2328" text-anchor="start" font-weight="normal">• agent_loop 引擎本身（两入口本来就汇合）</text><text x="60" y="848" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#1f2328" text-anchor="start" font-weight="normal">• 底层存储 _msg_to_node / SessionStore（同一个）</text><text x="60" y="872" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#1f2328" text-anchor="start" font-weight="normal">• compute_reads 已支持整张图检索（frame=-1=聊天特例）</text><rect x="750.0" y="770" width="690.0" height="150" rx="12" fill="#fff8e6" stroke="#9a6700" stroke-width="1.8"/><text x="770.0" y="798" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="15" fill="#9a6700" text-anchor="start" font-weight="bold">合并要做的（见 execution-graph.md §8）</text><text x="770.0" y="824" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#1f2328" text-anchor="start" font-weight="normal">1 render 按 tool_call_id 分两路   2 统一 status + close 补字段</text><text x="770.0" y="848" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#1f2328" text-anchor="start" font-weight="normal">3 render 补缺口   4 聊天上下文换 compute_reads（留 parent_id 骨架）</text><text x="770.0" y="872" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#1f2328" text-anchor="start" font-weight="normal">5 聊天记录改调 open/close_call_node   6 system 统一 · 重试抽出共用</text>
</svg>