<svg width="1280" height="900" viewBox="0 0 1280 900" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="var(--canvas)"/>
      <stop offset="1" stop-color="var(--canvas2)"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="var(--shadow)" flood-opacity="0.38"/>
    </filter>
    <marker id="aGrey" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--muted)"/>
    </marker>
    <marker id="aGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3fb950"/>
    </marker>
    <marker id="aPurple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#bc8cf2"/>
    </marker>
    <marker id="aBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#58a6ff"/>
    </marker>
    <marker id="aAmber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d9a73a"/>
    </marker>
    <style>
      svg {
        --canvas:#0d1117; --canvas2:#0f1722; --card:#161b22; --border:#30363d;
        --ink:#e6edf3; --muted:#8b949e; --shadow:#000000;
        --blue-fill:#0f2030; --blue-border:#1f3354;
        --purple-fill:#1d1530; --purple-ring:#3d2e52;
        --green-fill:#10231a; --green-border:#1f4030;
        --amber-fill:#241a0f; --amber-border:#4a3414;
        --grey-fill:#15191f; --grey-border:#2a2f37;
        --loopbg:#120f1c;
      }
      @media (prefers-color-scheme: light) {
        svg {
          --canvas:#ffffff; --canvas2:#f6f8fa; --card:#f6f8fa; --border:#d0d7de;
          --ink:#1f2328; --muted:#636c76; --shadow:#57606a;
          --blue-fill:#ddf4ff; --blue-border:#b6e3ff;
          --purple-fill:#faf3ff; --purple-ring:#e7d8fb;
          --green-fill:#e9f8ee; --green-border:#bef0cb;
          --amber-fill:#fff8e6; --amber-border:#f5d98a;
          --grey-fill:#eef1f4; --grey-border:#d8dde2;
          --loopbg:#f4f0fb;
        }
      }
      .flow { stroke-dasharray: 6 7; animation: dash 1.6s linear infinite; }
      @keyframes dash { to { stroke-dashoffset: -13; } }
      .flowback { stroke-dasharray: 5 6; animation: dashback 1.8s linear infinite; }
      @keyframes dashback { to { stroke-dashoffset: 11; } }
      .t { fill: var(--ink); } .s { fill: var(--muted); }
    </style>
  </defs>

  <rect x="1" y="1" width="1278" height="898" rx="16" fill="url(#bg)" stroke="var(--border)"/>

  <text x="640" y="38" text-anchor="middle" font-size="20" font-weight="700" class="t">Agent 调用拓扑 — 收敛分叉，不是三层嵌套</text>
  <text x="640" y="60" text-anchor="middle" font-size="12" class="s">两个平级入口（dispatcher · runtime.exec），各管各的外围 + 各写各的 DAG 记录，只在共享的 agent_loop 汇合。exec 在 loop 之下 → 工具体内可再调 LLM（嵌套）。</text>

  <!-- ===== TWO PARALLEL ENTRIES ===== -->
  <!-- Entry A: dispatcher -->
  <g filter="url(#soft)">
    <rect x="70" y="92" width="440" height="150" rx="14" fill="var(--blue-fill)" stroke="#58a6ff" stroke-width="1.4"/>
    <text x="90" y="116" font-size="13.5" font-weight="700" fill="#58a6ff">入口 A · dispatcher（用户消息：webui/CLI/channel）</text>
    <text x="90" y="133" font-size="9.5" class="s">turn 管理。process_user_turn → _run_loop_blocking（__init__.py）</text>
    <!-- ordered steps compressed -->
    <rect x="90" y="142" width="400" height="22" rx="5" fill="var(--card)" stroke="var(--border)"/>
    <text x="96" y="157" font-size="9" class="s">1 建/载 session · 2 写 user 节点 · 3 attach Runtime · 4 resolve model</text>
    <rect x="90" y="168" width="400" height="22" rx="5" fill="var(--card)" stroke="var(--border)"/>
    <text x="96" y="183" font-size="9" class="s">5 解析工具(channel/plan/审批) · 7 持久化 + finalize(标题/compact)</text>
    <rect x="90" y="194" width="400" height="38" rx="6" fill="var(--green-fill)" stroke="#3fb950" stroke-width="1.1"/>
    <text x="290" y="210" text-anchor="middle" font-size="11" font-weight="600" fill="#3fb950">6 直接调 agent_loop ↓（不经过 exec）</text>
    <text x="290" y="225" text-anchor="middle" font-size="8.5" class="s">自己建 context+config，agent_loop([prompt],...) · __init__.py:902</text>
  </g>
  <!-- DAG record A -->
  <g filter="url(#soft)">
    <rect x="70" y="252" width="440" height="30" rx="8" fill="var(--grey-fill)" stroke="var(--grey-border)"/>
    <text x="90" y="271" font-size="9.5" class="s">顶层回复 → <tspan fill="#58a6ff" font-weight="600">assistant 会话消息</tspan>（SessionDB, persistence.py:207），不是 role=llm 节点</text>
  </g>

  <!-- Entry B: runtime.exec -->
  <g filter="url(#soft)">
    <rect x="770" y="92" width="440" height="150" rx="14" fill="var(--purple-fill)" stroke="#bc8cf2" stroke-width="1.4"/>
    <text x="790" y="116" font-size="13.5" font-weight="700" fill="#bc8cf2">入口 B · runtime.exec（@agentic_function 体内 / decision.make）</text>
    <text x="790" y="133" font-size="9.5" class="s">一次 LLM 调用 = 一个 llm 节点。exec → _call → _call_via_providers</text>
    <rect x="790" y="142" width="400" height="22" rx="5" fill="var(--card)" stroke="var(--border)"/>
    <text x="796" y="157" font-size="9" class="s">1 开 llm 节点(running, _call_id→它) · 含 timeout/retry 外循环</text>
    <rect x="790" y="168" width="400" height="22" rx="5" fill="var(--card)" stroke="var(--border)"/>
    <text x="796" y="183" font-size="8.3" class="s">2 构建上下文 a选历史→b render→c解析工具→d system+skills→e建 AgentSession</text>
    <rect x="790" y="194" width="400" height="38" rx="6" fill="var(--green-fill)" stroke="#3fb950" stroke-width="1.1"/>
    <text x="990" y="210" text-anchor="middle" font-size="11" font-weight="600" fill="#3fb950">3 经 AgentSession → agent_loop ↓</text>
    <text x="990" y="225" text-anchor="middle" font-size="8.5" class="s">session.run(runtime.py:1576) → Agent → agent_loop(agent.py:418) · 4 关 llm 节点</text>
  </g>
  <!-- DAG record B -->
  <g filter="url(#soft)">
    <rect x="770" y="252" width="440" height="30" rx="8" fill="var(--grey-fill)" stroke="var(--grey-border)"/>
    <text x="790" y="271" font-size="9.5" class="s">这次调用 → <tspan fill="#bc8cf2" font-weight="600">role=llm DAG 节点</tspan>（开 running → 回填 success）</text>
  </g>

  <!-- converge arrows into agent_loop -->
  <path d="M 290 282 C 290 320 470 330 560 345" stroke="#58a6ff" stroke-width="1.7" fill="none" marker-end="url(#aGreen)" class="flow"/>
  <text x="380" y="318" font-size="9.5" fill="#58a6ff">直接</text>
  <path d="M 990 282 C 990 320 810 330 720 345" stroke="#bc8cf2" stroke-width="1.7" fill="none" marker-end="url(#aGreen)" class="flow"/>
  <text x="900" y="318" font-size="9.5" fill="#bc8cf2">经 AgentSession</text>

  <text x="640" y="312" text-anchor="middle" font-size="11" font-weight="700" fill="#3fb950">▼ 只在这里汇合 ▼</text>

  <!-- ===== SHARED agent_loop ===== -->
  <rect x="300" y="338" width="680" height="320" rx="15" fill="var(--loopbg)" stroke="#3fb950" stroke-width="1.5"/>
  <text x="640" y="362" text-anchor="middle" font-size="14" font-weight="700" fill="#3fb950">共享引擎 · agent_loop（agent_loop.py:114）</text>
  <text x="640" y="379" text-anchor="middle" font-size="9.5" class="s">两个入口唯一汇合点。每轮前：convert_to_llm → memory prefetch → deferred re-split</text>

  <!-- cycle -->
  <g filter="url(#soft)"><rect x="500" y="396" width="280" height="44" rx="10" fill="var(--purple-fill)" stroke="#bc8cf2" stroke-width="1.2"/>
    <text x="640" y="415" text-anchor="middle" font-size="12" font-weight="600" fill="#bc8cf2">调模型 / 流式</text>
    <text x="640" y="430" text-anchor="middle" font-size="8.5" class="s">_stream_assistant_response → stream_fn</text></g>

  <g filter="url(#soft)"><path d="M 640 452 L 712 486 L 640 520 L 568 486 Z" fill="var(--amber-fill)" stroke="#d9a73a" stroke-width="1.3"/>
    <text x="640" y="482" text-anchor="middle" font-size="11" font-weight="600" fill="#d9a73a">回复是</text>
    <text x="640" y="496" text-anchor="middle" font-size="11" font-weight="600" fill="#d9a73a">tool_use？</text></g>

  <g filter="url(#soft)"><rect x="500" y="540" width="280" height="50" rx="10" fill="var(--green-fill)" stroke="#3fb950" stroke-width="1.2"/>
    <text x="640" y="560" text-anchor="middle" font-size="12" font-weight="600" fill="#3fb950">执行工具</text>
    <text x="640" y="576" text-anchor="middle" font-size="8.3" class="s">_execute_tool_calls · code 节点 called_by → 当前 llm 节点</text></g>

  <line x1="640" y1="440" x2="640" y2="452" stroke="#bc8cf2" stroke-width="1.5" marker-end="url(#aPurple)" class="flow"/>
  <line x1="640" y1="520" x2="640" y2="540" stroke="#d9a73a" stroke-width="1.5" marker-end="url(#aGreen)" class="flow"/>
  <text x="656" y="536" font-size="10" font-weight="600" fill="#3fb950">是</text>
  <path d="M 500 565 C 430 565 430 418 500 418" stroke="#3fb950" stroke-width="1.5" fill="none" marker-end="url(#aGreen)" class="flowback"/>
  <text x="350" y="486" font-size="9.5" fill="#3fb950">结果喂回</text>
  <text x="350" y="498" font-size="9.5" fill="#3fb950">→ 再调模型</text>

  <!-- exit text -->
  <line x1="712" y1="486" x2="900" y2="486" stroke="#3fb950" stroke-width="1.6" marker-end="url(#aGreen)" class="flow"/>
  <text x="806" y="478" text-anchor="middle" font-size="10" font-weight="600" fill="#3fb950">否 · 纯文本 → 结束</text>
  <g filter="url(#soft)"><rect x="836" y="540" width="128" height="48" rx="10" fill="var(--green-fill)" stroke="#3fb950" stroke-width="1.2"/>
    <text x="900" y="560" text-anchor="middle" font-size="10.5" font-weight="600" fill="#3fb950">结束 → 回入口</text>
    <text x="900" y="575" text-anchor="middle" font-size="8" class="s">A:持久化 / B:关 llm 节点</text></g>
  <line x1="900" y1="498" x2="900" y2="540" stroke="#3fb950" stroke-width="1.4" marker-end="url(#aGreen)" class="flow"/>

  <!-- ===== NESTING: exec is BELOW the loop ===== -->
  <g filter="url(#soft)">
    <rect x="500" y="606" width="280" height="40" rx="9" fill="var(--purple-fill)" stroke="#bc8cf2" stroke-width="1.2" stroke-dasharray="4 3"/>
    <text x="640" y="623" text-anchor="middle" font-size="10.5" font-weight="600" fill="#bc8cf2">工具是 @agentic_function？→ 体内再调 runtime.exec</text>
    <text x="640" y="636" text-anchor="middle" font-size="8" class="s">回到「入口 B」再开一个 llm 节点 → 嵌套（wiki_agent 递归即此）</text>
  </g>
  <line x1="640" y1="590" x2="640" y2="606" stroke="#bc8cf2" stroke-width="1.3" marker-end="url(#aPurple)" class="flowback"/>
  <!-- nesting arrow back up to entry B -->
  <path d="M 780 626 C 1060 626 1240 440 1240 240 C 1240 200 1215 188 1210 180" stroke="#bc8cf2" stroke-width="1.4" fill="none" marker-end="url(#aPurple)" class="flowback" opacity="0.85"/>
  <text x="1090" y="500" font-size="9.5" fill="#bc8cf2" transform="rotate(-90 1090 500)">工具体内 exec = 入口 B 再次进入（嵌套）</text>

  <!-- ===== insertion points ===== -->
  <g filter="url(#soft)">
    <rect x="70" y="676" width="560" height="150" rx="12" fill="var(--card)" stroke="var(--grey-border)"/>
    <text x="90" y="698" font-size="12" font-weight="700" class="s">挂在 agent_loop 上的插入点（已有）</text>
    <text x="90" y="716" font-size="9" class="s">调模型周围：timeout · 重试+jitter · 取消 · usage 计量</text>
    <text x="90" y="733" font-size="9" class="s">执行工具前：tool.before 事件 · 审批 gate · 参数校验</text>
    <text x="90" y="750" font-size="9" class="s">循环内：steering 注入 · iteration_cap 上限</text>
    <text x="90" y="767" font-size="9" class="s">入口 B 专属：AgentSession retry-with-message-rollback</text>
    <text x="90" y="784" font-size="9" class="s">入口 A 专属：on_event → WebSocket 广播 · plan-mode 过滤</text>
    <text x="90" y="806" font-size="8.5" class="s" font-style="italic">两入口共享 loop，但各自的外围插件不同——这正是不能合并的原因</text>
  </g>
  <g filter="url(#soft)">
    <rect x="650" y="676" width="560" height="150" rx="12" fill="var(--card)" stroke="var(--amber-border)" stroke-width="1.1" stroke-dasharray="4 4"/>
    <text x="670" y="698" font-size="12" font-weight="700" fill="#d9a73a">未来可插入（别框架有，挂对应节点，不改骨架）</text>
    <text x="670" y="716" font-size="9" class="s">· 错误分类 → 恢复路由（挂"调模型 / 重试"，Hermes）</text>
    <text x="670" y="733" font-size="9" class="s">· 工具结果按上下文预算裁剪（挂"执行工具"后，OpenClaw）</text>
    <text x="670" y="750" font-size="9" class="s">· 工具参数修复（挂"tool_use 解析"，OpenClaw）</text>
    <text x="670" y="767" font-size="9" class="s">· 结构化输出强制（挂入口 B"关 llm 节点"前，OpenCode）</text>
    <text x="670" y="784" font-size="9" class="s">· 卡死/僵连接检测 · 多断点 cache 策略（挂"调模型"）</text>
  </g>

  <!-- legend -->
  <g>
    <rect x="70" y="848" width="13" height="13" rx="3" fill="var(--blue-fill)" stroke="#58a6ff"/>
    <text x="90" y="858" font-size="9.5" class="s">入口 A（dispatcher）</text>
    <rect x="225" y="848" width="13" height="13" rx="3" fill="var(--purple-fill)" stroke="#bc8cf2"/>
    <text x="245" y="858" font-size="9.5" class="s">入口 B（runtime.exec）</text>
    <rect x="390" y="848" width="13" height="13" rx="3" fill="var(--loopbg)" stroke="#3fb950"/>
    <text x="410" y="858" font-size="9.5" class="s">共享引擎(agent_loop)</text>
    <line x1="560" y1="855" x2="590" y2="855" stroke="#3fb950" stroke-width="1.5" marker-end="url(#aGreen)" class="flow"/>
    <text x="598" y="858" font-size="9.5" class="s">主流</text>
    <line x1="650" y1="855" x2="680" y2="855" stroke="#bc8cf2" stroke-width="1.4" marker-end="url(#aPurple)" class="flowback"/>
    <text x="688" y="858" font-size="9.5" class="s">嵌套 / 喂回</text>
  </g>

  <text x="70" y="884" font-size="10" class="s">关键：dispatcher 不经过 exec，exec 也不经过 dispatcher——两者只共享 agent_loop。exec 在 loop 之下 → @agentic_function 工具体内能再起一次 exec，形成嵌套（这是 agentic programming 的根本能力，也是 wiki_agent 递归的来源）。</text>
</svg>
