 x="850.0" y="1350" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#1f2328" text-anchor="start" font-weight="normal">1 render 分两路  2 统一 status+close 补字段  3 render 补缺口</text><text x="850.0" y="1376" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#1f2328" text-anchor="start" font-weight="normal">4 聊天上下文换 compute_reads（留 parent_id 骨架）</text><text x="850.0" y="1402" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#1f2328" text-anchor="start" font-weight="normal">5 聊天记录改调 open/close_call_node  6 system 统一+重试共用</text>
