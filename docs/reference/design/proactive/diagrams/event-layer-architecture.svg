<svg viewBox="0 0 1240 720" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif">
<style>
.mono{font-family:'JetBrains Mono','SF Mono',Menlo,Consolas,monospace}
.box{fill:#101d31;stroke:rgba(154,178,204,.45);stroke-width:1.2}
.bt{fill:#d9e5f1;font-size:15px;font-weight:600}
.bs{fill:#8aa0b8;font-size:11.5px}
.faint{fill:#5f7a90}
.tagA{fill:rgba(86,217,233,.14);stroke:rgba(86,217,233,.6)}
.tagB{fill:rgba(183,155,245,.14);stroke:rgba(183,155,245,.6)}
.tg{font-size:10px;font-weight:700}
.cy{fill:#56d9e9}.vi{fill:#b79bf5}.am{fill:#f2b544}
.lbl{fill:#8aa0b8;font-size:11px;letter-spacing:.12em}
.flowA{fill:none;stroke:#56d9e9;stroke-width:1.6;stroke-dasharray:7 9;animation:f 1.6s linear infinite;opacity:.85}
.flowB{fill:none;stroke:#b79bf5;stroke-width:1.6;stroke-dasharray:7 9;animation:f 1.9s linear infinite;opacity:.8}
.flowI{fill:none;stroke:#f2b544;stroke-width:2;stroke-dasharray:4 6;animation:f .9s linear infinite}
@keyframes f{to{stroke-dashoffset:-16}}
.frame{fill:none;stroke:rgba(154,178,204,.35);stroke-width:1.2;stroke-dasharray:6 8}
</style>

<!-- 底 -->
<rect x="0" y="0" width="1240" height="720" rx="16" fill="#0d1828"/>
<!-- 细网格 -->
<g stroke="rgba(154,178,204,.05)" stroke-width="1">
  <path d="M0 60H1240M0 120H1240M0 180H1240M0 240H1240M0 300H1240M0 360H1240M0 420H1240M0 480H1240M0 540H1240M0 600H1240M0 660H1240"/>
  <path d="M60 0V720M120 0V720M180 0V720M240 0V720M300 0V720M360 0V720M420 0V720M480 0V720M540 0V720M600 0V720M660 0V720M720 0V720M780 0V720M840 0V720M900 0V720M960 0V720M1020 0V720M1080 0V720M1140 0V720M1200 0V720"/>
</g>

<!-- worker 进程框 -->
<rect class="frame" x="18" y="46" width="966" height="592" rx="14"/>
<text class="lbl mono" x="36" y="74">WORKER 进程 · 单进程 · 多 DAEMON 线程</text>

<!-- A 类源 -->
<text class="lbl mono cy" x="48" y="118">A 类 · AGENT 活动</text>
<rect class="box" x="48" y="132" width="208" height="62" rx="8"/>
<rect class="tagA" x="62" y="146" width="22" height="22" rx="5"/><text class="tg cy" x="69" y="161">A</text>
<text class="bt" x="96" y="156">agent loop</text>
<text class="bs" x="96" y="178">模型回复 · 工具前后 · 文件改</text>

<rect class="box" x="48" y="208" width="208" height="56" rx="8"/>
<rect class="tagA" x="62" y="222" width="22" height="22" rx="5"/><text class="tg cy" x="69" y="237">A</text>
<text class="bt" x="96" y="232">task runner</text>
<text class="bs" x="96" y="252">子任务起止</text>

<!-- B 类源 -->
<text class="lbl mono vi" x="48" y="312">B 类 · 系统状态</text>
<rect class="box" x="48" y="326" width="208" height="52" rx="8"/>
<rect class="tagB" x="62" y="340" width="22" height="22" rx="5"/><text class="tg vi" x="69" y="355">B</text>
<text class="bt" x="96" y="348">auth</text>
<text class="bs" x="96" y="368">凭据限流 / 轮换</text>

<rect class="box" x="48" y="392" width="208" height="52" rx="8"/>
<rect class="tagB" x="62" y="406" width="22" height="22" rx="5"/><text class="tg vi" x="69" y="421">B</text>
<text class="bt" x="96" y="414">context</text>
<text class="bs" x="96" y="434">压缩阈值 70% / 80%</text>

<rect class="box" x="48" y="458" width="208" height="52" rx="8"/>
<rect class="tagB" x="62" y="472" width="22" height="22" rx="5"/><text class="tg vi" x="69" y="487">B</text>
<text class="bt" x="96" y="480">channels</text>
<text class="bs" x="96" y="500">外部消息进来</text>

<rect class="box" x="48" y="524" width="208" height="52" rx="8"/>
<rect class="tagB" x="62" y="538" width="22" height="22" rx="5"/><text class="tg vi" x="69" y="553">B</text>
<text class="bt" x="96" y="546">memory</text>
<text class="bs" x="96" y="566">空闲处理起止</text>

<!-- 汇入流线 -->
<path class="flowA" d="M256 163 C 340 163, 360 240, 432 280"/>
<path class="flowA" d="M256 236 C 340 236, 360 270, 432 300"/>
<path class="flowB" d="M256 352 C 340 352, 360 330, 432 326"/>
<path class="flowB" d="M256 418 C 340 418, 360 370, 432 350"/>
<path class="flowB" d="M256 484 C 340 484, 360 410, 432 374"/>
<path class="flowB" d="M256 550 C 340 550, 360 450, 432 396"/>
<text class="lbl mono" x="318" y="146">emit(Event)</text>

<!-- EventBus -->
<rect x="436" y="208" width="200" height="262" rx="16" fill="none" stroke="rgba(86,217,233,.25)" stroke-width="7" opacity=".6"/>
<rect x="436" y="208" width="200" height="262" rx="16" fill="rgba(86,217,233,.05)" stroke="#56d9e9" stroke-width="1.6"/>
<text class="mono cy" x="536" y="262" text-anchor="middle" font-size="21" font-weight="600">EventBus</text>
<text class="bs" x="536" y="288" text-anchor="middle">进程级单例</text>
<text class="bs mono" x="536" y="312" text-anchor="middle">get_event_bus()</text>
<line x1="458" y1="334" x2="614" y2="334" stroke="rgba(154,178,204,.25)"/>
<text class="bs mono" x="536" y="362" text-anchor="middle">emit(Event)</text>
<text class="bs mono" x="536" y="386" text-anchor="middle">subscribe(types=…)</text>
<text class="bs faint" x="536" y="430" text-anchor="middle">源和消费者互不认识</text>
<text class="bs faint" x="536" y="450" text-anchor="middle">只认总线</text>

<!-- 观察出线 -->
<text class="lbl mono cy" x="688" y="160">观察 · 异步 · 不挡 AGENT</text>
<path class="flowA" d="M636 280 C 700 270, 706 212, 756 200"/>
<path class="flowA" d="M636 320 C 700 320, 710 330, 756 334"/>
<rect class="box" x="758" y="172" width="206" height="58" rx="8"/>
<text class="bt" x="776" y="196">webui server</text>
<text class="bs" x="776" y="216">订阅 → 转发前端 WebSocket</text>

<rect class="box" x="758" y="306" width="206" height="58" rx="8" stroke="rgba(86,217,233,.55)"/>
<text class="bt" x="776" y="330">proactive</text>
<text class="bs" x="776" y="350">第一个消费者 · 规则层（另文设计）</text>

<!-- 拦截 -->
<text class="lbl mono am" x="660" y="486">拦截 · 同步 · 仅 TOOL.BEFORE</text>
<path class="flowI" d="M636 430 C 690 470, 700 512, 752 528"/>
<path class="flowI" d="M752 552 C 700 560, 660 540, 624 470"/>
<rect class="box" x="756" y="500" width="208" height="74" rx="8" stroke="rgba(242,181,68,.6)"/>
<text class="bt" x="774" y="526">tool.before 问询点</text>
<text class="bs" x="774" y="546">复用 _approval · 拦下 / 确认 / 放行</text>
<text class="bs faint" x="774" y="564">对 subagent 同样生效</text>

<!-- 前端（进程外） -->
<path class="flowA" d="M964 200 C 1010 200, 1020 200, 1046 200"/>
<text class="lbl mono" x="986" y="188">WS</text>
<rect class="box" x="1048" y="166" width="160" height="66" rx="8" stroke-dasharray="4 5"/>
<text class="bt" x="1068" y="194">前端 / TUI</text>
<text class="bs" x="1068" y="214">浏览器 · 命令行</text>
<text class="bs faint" x="1048" y="258" font-size="10.5">（worker 进程之外）</text>

<!-- 图例 -->
<line x1="36" y1="668" x2="1204" y2="668" stroke="rgba(154,178,204,.22)"/>
<line x1="48" y1="694" x2="84" y2="694" stroke="#56d9e9" stroke-width="2" stroke-dasharray="6 6"/>
<text class="bs mono" x="96" y="698">A 类事件 · 观察（异步）</text>
<line x1="328" y1="694" x2="364" y2="694" stroke="#b79bf5" stroke-width="2" stroke-dasharray="6 6"/>
<text class="bs mono" x="376" y="698">B 类事件 · 观察（异步）</text>
<line x1="608" y1="694" x2="644" y2="694" stroke="#f2b544" stroke-width="2" stroke-dasharray="4 5"/>
<text class="bs mono" x="656" y="698">拦截（同步，仅 tool.before）</text>
</svg>
