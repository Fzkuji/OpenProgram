<svg viewBox="0 0 1240 700" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif">
<style>
.mono{font-family:'JetBrains Mono','SF Mono',Menlo,Consolas,monospace}
.box{fill:#101d31;stroke:rgba(154,178,204,.45);stroke-width:1.2}
.bt{fill:#d9e5f1;font-size:14.5px;font-weight:600}
.bs{fill:#8aa0b8;font-size:11.5px}
.faint{fill:#5f7a90}
.rd{fill:#f07a6a}.am{fill:#f2b544}.cy{fill:#56d9e9}.vi{fill:#b79bf5}.gn{fill:#6fd98f}
.lbl{fill:#8aa0b8;font-size:10.5px}
/* 五种互不相同的连线 = 六套机制各自为政 */
.w1{fill:none;stroke:#56d9e9;stroke-width:1.5}
.w2{fill:none;stroke:#f2b544;stroke-width:1.5;stroke-dasharray:8 4}
.w3{fill:none;stroke:#b79bf5;stroke-width:1.5;stroke-dasharray:2 4}
.w4{fill:none;stroke:#6fd98f;stroke-width:1.5;stroke-dasharray:12 4 2 4}
.w5{fill:none;stroke:#e08fc7;stroke-width:1.5;stroke-dasharray:5 8}
.dead{fill:none;stroke:rgba(240,122,106,.7);stroke-width:1.4;stroke-dasharray:4 4}
</style>
<rect x="0" y="0" width="1240" height="700" rx="16" fill="#0d1828"/>
<g stroke="rgba(154,178,204,.05)"><path d="M0 70H1240M0 140H1240M0 210H1240M0 280H1240M0 350H1240M0 420H1240M0 490H1240M0 560H1240M0 630H1240"/><path d="M70 0V700M140 0V700M210 0V700M280 0V700M350 0V700M420 0V700M490 0V700M560 0V700M630 0V700M700 0V700M770 0V700M840 0V700M910 0V700M980 0V700M1050 0V700M1120 0V700M1190 0V700"/></g>

<text class="bs mono rd" x="44" y="44" style="letter-spacing:.2em">现状 · 六套机制各自为政，WEBUI 被迫当信号中枢</text>

<!-- ── 左列：源 ── -->
<rect class="box" x="48" y="84" width="200" height="58" rx="8"/>
<text class="bt" x="68" y="108">agent loop</text>
<text class="bs faint" x="68" y="128">AgentEvent 内部流</text>
<text class="bs rd" x="68" y="160">hooks 返回值被丢弃 ✕ 只能看不能拦</text>

<rect class="box" x="48" y="184" width="200" height="52" rx="8"/>
<text class="bt" x="68" y="206">task runner</text>
<text class="bs faint" x="68" y="226">task_status JSON</text>

<rect class="box" x="48" y="262" width="200" height="52" rx="8"/>
<text class="bt" x="68" y="284">channels</text>
<text class="bs faint" x="68" y="304">channel_turn 广播</text>

<rect class="box" x="48" y="340" width="200" height="52" rx="8"/>
<text class="bt" x="68" y="362">skills watcher</text>
<text class="bs faint" x="68" y="382">skills:changed</text>

<rect class="box" x="48" y="418" width="200" height="52" rx="8"/>
<text class="bt" x="68" y="440">auth</text>
<text class="bs faint" x="68" y="460">规范的 _emit/subscribe</text>

<rect class="box" x="48" y="496" width="200" height="52" rx="8" stroke-dasharray="4 5" stroke="rgba(240,122,106,.45)"/>
<text class="bt faint" x="68" y="518">memory</text>
<text class="bs rd" x="68" y="538">定时 poll · 无信号 ✕</text>

<rect class="box" x="48" y="574" width="200" height="52" rx="8" stroke-dasharray="4 5" stroke="rgba(240,122,106,.45)"/>
<text class="bt faint" x="68" y="596">文件改动</text>
<text class="bs rd" x="68" y="616">默默备份 · 无信号 ✕</text>

<!-- ── 中右：webui 中枢 ── -->
<rect class="box" x="640" y="240" width="250" height="150" rx="12" stroke="rgba(240,122,106,.6)" stroke-width="1.6"/>
<text class="bt" x="668" y="276">webui server</text>
<text class="bs rd" x="668" y="300">被迫当中枢 —— 谁要让前端</text>
<text class="bs rd" x="668" y="320">看到什么，就直连我广播</text>
<text class="bs faint" x="668" y="352">_broadcast() · 五花八门的 JSON</text>
<text class="bs faint" x="668" y="372">~80 种 ad-hoc 事件类型</text>

<!-- 五条各不相同的直连线 -->
<path class="w1" d="M248 113 C 430 113, 500 230, 638 268"/>
<text class="lbl cy" x="380" y="106" >envelope 回调链</text>
<path class="w2" d="M248 210 C 430 210, 500 260, 638 290"/>
<text class="lbl am" x="400" y="208">直连 _broadcast</text>
<path class="w3" d="M248 288 C 430 288, 500 296, 638 312"/>
<text class="lbl vi" x="420" y="282">又一种 JSON</text>
<path class="w4" d="M248 366 C 430 366, 500 340, 638 334"/>
<text class="lbl gn" x="420" y="372">再一种格式</text>

<!-- auth：断头线 -->
<path class="dead" d="M248 444 C 360 444, 420 440, 480 436"/>
<text class="bs rd" x="492" y="440">⊘ 做对了，但几乎没人订阅</text>

<!-- 前端 -->
<path class="w1" d="M890 300 L 1010 300"/>
<text class="lbl" x="922" y="290">WS</text>
<rect class="box" x="1014" y="268" width="170" height="64" rx="8" stroke-dasharray="4 5"/>
<text class="bt" x="1036" y="296">前端 / TUI</text>
<text class="bs faint" x="1036" y="316">唯一的消费者</text>

<!-- EventBus 闲置 -->
<rect x="660" y="540" width="220" height="80" rx="10" fill="rgba(16,29,49,.5)" stroke="rgba(154,178,204,.25)" stroke-dasharray="5 6"/>
<text class="bt faint" x="684" y="572">EventBus</text>
<text class="bs rd" x="684" y="596">造好了，零处订阅 · 闲置落灰</text>

<!-- 病症注 -->
<line x1="640" y1="450" x2="1190 " y2="450" stroke="rgba(154,178,204,.18)"/>
<text class="bs" x="950" y="486">想加一个新消费者（比如 proactive）：</text>
<text class="bs rd" x="950" y="510">得分别对接五六套机制，</text>
<text class="bs rd" x="950" y="532">有的时机根本没信号可接</text>
<text class="bs faint" x="950" y="566">没有统一格式 · 没有统一订阅</text>
<text class="bs faint" x="950" y="588">能看不能拦 · 新消费者无处下手</text>
</svg>
