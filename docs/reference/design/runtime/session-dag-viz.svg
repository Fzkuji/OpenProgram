<svg xmlns="http://www.w3.org/2000/svg" width="680" height="720" viewBox="0 0 680 720">
<style>
  text { font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; }
  .title { font-size: 18px; font-weight: bold; fill: #e6edf3; }
  .subtitle { font-size: 12px; fill: #8b949e; }
  .label { font-size: 11px; fill: #e6edf3; }
  .muted { font-size: 10px; fill: #8b949e; }
  .branch-label { font-size: 10px; fill: #58a6ff; font-weight: 600; }
  .tree-line { stroke: #58a6ff; stroke-width: 1.8; fill: none; }
  .tree-line-branch { stroke: #3fb950; stroke-width: 1.8; fill: none; }
  .node-stroke { stroke-width: 2.6; fill: transparent; }
  .node-fill { stroke-width: 2.6; fill: #ffffff; }
</style>
<rect width="680" height="720" rx="12" fill="#161b22"/>

<!-- Title -->
<text x="30" y="36" class="title">Session DAG — 调用树视图（设计稿）</text>
<text x="30" y="54" class="subtitle">ROOT 竖线 + 横向分支连线 · 分支往右偏移到新列</text>

<!-- Legend -->
<g transform="translate(30, 74)">
  <rect x="0" y="0" width="12" height="12" rx="1" transform="rotate(45 6 6)" class="node-stroke" stroke="#58a6ff"/>
  <text x="20" y="10" class="muted">ROOT（会话根）</text>
  <circle cx="106" cy="6" r="6" class="node-stroke" stroke="#58a6ff"/>
  <text x="118" y="10" class="muted">user（用户消息）</text>
  <polygon points="226,0 233,12 219,12" class="node-stroke" stroke="#58a6ff"/>
  <text x="240" y="10" class="muted">llm（大模型）</text>
  <rect x="320" y="0" width="11" height="11" rx="0" class="node-stroke" stroke="#58a6ff"/>
  <text x="338" y="10" class="muted">code（函数调用）</text>
</g>

<!-- ═══════════════════════════════════════════════ -->
<!-- 场景 1：正常多轮聊天（无分支）                    -->
<!-- ═══════════════════════════════════════════════ -->
<text x="30" y="116" class="subtitle">场景 1：正常多轮聊天</text>

<!-- ROOT node -->
<g transform="translate(60, 140)">
  <rect x="-7" y="-7" width="14" height="14" rx="1.5" transform="rotate(45)" class="node-fill" stroke="#58a6ff"/>
  <text x="18" y="4" class="label">ROOT</text>
</g>

<!-- Vertical trunk line from ROOT down -->
<line x1="60" y1="152" x2="60" y2="310" class="tree-line"/>

<!-- Turn 1: user1 -->
<line x1="60" y1="176" x2="80" y2="176" class="tree-line"/>
<g transform="translate(90, 176)">
  <circle cx="0" cy="0" r="6" class="node-fill" stroke="#58a6ff"/>
  <text x="12" y="4" class="label">user1 "你好"</text>
</g>
<!-- user1 → llm1 -->
<line x1="90" y1="184" x2="90" y2="206" class="tree-line"/>
<line x1="90" y1="206" x2="110" y2="206" class="tree-line"/>
<g transform="translate(120, 206)">
  <polygon points="0,-7 6,5 -6,5" class="node-fill" stroke="#58a6ff"/>
  <text x="12" y="4" class="label">llm1 "你好呀"</text>
</g>

<!-- Turn 2: user2 -->
<line x1="60" y1="240" x2="80" y2="240" class="tree-line"/>
<g transform="translate(90, 240)">
  <circle cx="0" cy="0" r="6" class="node-fill" stroke="#58a6ff"/>
  <text x="12" y="4" class="label">user2 "调研 X"</text>
</g>
<!-- user2 → llm2 -->
<line x1="90" y1="248" x2="90" y2="270" class="tree-line"/>
<line x1="90" y1="270" x2="110" y2="270" class="tree-line"/>
<g transform="translate(120, 270)">
  <polygon points="0,-7 6,5 -6,5" class="node-fill" stroke="#58a6ff"/>
  <text x="12" y="4" class="label">llm2</text>
</g>
<!-- llm2 → wiki_agent (tool call) -->
<line x1="120" y1="278" x2="120" y2="300" class="tree-line"/>
<line x1="120" y1="300" x2="140" y2="300" class="tree-line"/>
<g transform="translate(150, 300)">
  <rect x="-6" y="-6" width="12" height="12" rx="0" class="node-fill" stroke="#58a6ff"/>
  <text x="12" y="4" class="label">wiki_agent</text>
</g>

<!-- Turn 3: user3 -->
<line x1="60" y1="310" x2="80" y2="310" class="tree-line"/>
<g transform="translate(90, 310)">
  <circle cx="0" cy="0" r="6" class="node-fill" stroke="#58a6ff"/>
  <text x="12" y="4" class="label">user3 "谢谢"</text>
</g>
<line x1="90" y1="318" x2="90" y2="340" class="tree-line"/>
<line x1="90" y1="340" x2="110" y2="340" class="tree-line"/>
<g transform="translate(120, 340)">
  <polygon points="0,-7 6,5 -6,5" class="node-fill" stroke="#58a6ff"/>
  <text x="12" y="4" class="label">llm3 "不客气"</text>
</g>

<!-- ═══════════════════════════════════════════════ -->
<!-- 场景 2：有分支（用户修改了 user2 重新发）         -->
<!-- ═══════════════════════════════════════════════ -->
<text x="30" y="390" class="subtitle">场景 2：在 user2 处分支（修改消息重新发）</text>

<!-- ROOT node -->
<g transform="translate(60, 414)">
  <rect x="-7" y="-7" width="14" height="14" rx="1.5" transform="rotate(45)" class="node-fill" stroke="#58a6ff"/>
  <text x="18" y="4" class="label">ROOT</text>
</g>

<!-- Vertical trunk line -->
<line x1="60" y1="426" x2="60" y2="560" class="tree-line"/>

<!-- Turn 1: user1 (shared) -->
<line x1="60" y1="450" x2="80" y2="450" class="tree-line"/>
<g transform="translate(90, 450)">
  <circle cx="0" cy="0" r="6" class="node-fill" stroke="#58a6ff"/>
  <text x="12" y="4" class="label">user1 "你好"</text>
</g>
<line x1="90" y1="458" x2="90" y2="480" class="tree-line"/>
<line x1="90" y1="480" x2="110" y2="480" class="tree-line"/>
<g transform="translate(120, 480)">
  <polygon points="0,-7 6,5 -6,5" class="node-fill" stroke="#58a6ff"/>
  <text x="12" y="4" class="label">llm1</text>
</g>

<!-- Turn 2: user2 (original, on main branch) -->
<line x1="60" y1="510" x2="80" y2="510" class="tree-line"/>
<g transform="translate(90, 510)">
  <circle cx="0" cy="0" r="6" class="node-fill" stroke="#58a6ff"/>
  <text x="12" y="4" class="label">user2 "调研 X"</text>
</g>
<line x1="90" y1="518" x2="90" y2="540" class="tree-line"/>
<line x1="90" y1="540" x2="110" y2="540" class="tree-line"/>
<g transform="translate(120, 540)">
  <polygon points="0,-7 6,5 -6,5" class="node-fill" stroke="#58a6ff"/>
  <text x="12" y="4" class="label">llm2</text>
</g>
<text x="148" y="544" class="muted">← main</text>

<!-- Turn 3: user3 (main continues) -->
<line x1="60" y1="560" x2="80" y2="560" class="tree-line"/>
<g transform="translate(90, 560)">
  <circle cx="0" cy="0" r="6" class="node-fill" stroke="#58a6ff"/>
  <text x="12" y="4" class="label">user3</text>
</g>
<line x1="90" y1="568" x2="90" y2="588" class="tree-line"/>
<line x1="90" y1="588" x2="110" y2="588" class="tree-line"/>
<g transform="translate(120, 588)">
  <polygon points="0,-7 6,5 -6,5" class="node-fill" stroke="#58a6ff"/>
  <text x="12" y="4" class="label">llm3</text>
</g>

<!-- ── Branch: user2' (modified, on new column to the right) ── -->
<!-- Branch line from ROOT trunk, further right -->
<line x1="60" y1="510" x2="300" y2="510" class="tree-line-branch" stroke-dasharray="4 3"/>
<g transform="translate(310, 510)">
  <circle cx="0" cy="0" r="6" class="node-stroke" stroke="#3fb950"/>
  <text x="12" y="4" class="label" style="fill:#3fb950">user2' "改成调研 Y"</text>
</g>
<!-- Vertical trunk for branch -->
<line x1="310" y1="518" x2="310" y2="540" class="tree-line-branch"/>
<line x1="310" y1="540" x2="330" y2="540" class="tree-line-branch"/>
<g transform="translate(340, 540)">
  <polygon points="0,-7 6,5 -6,5" class="node-stroke" stroke="#3fb950"/>
  <text x="12" y="4" class="label" style="fill:#3fb950">llm2'</text>
</g>
<text x="368" y="544" class="muted" style="fill:#3fb950">← branch</text>
<!-- Branch continues -->
<line x1="310" y1="548" x2="310" y2="570" class="tree-line-branch"/>
<line x1="310" y1="570" x2="330" y2="570" class="tree-line-branch"/>
<g transform="translate(340, 570)">
  <rect x="-6" y="-6" width="12" height="12" rx="0" class="node-stroke" stroke="#3fb950"/>
  <text x="12" y="4" class="label" style="fill:#3fb950">search_tool</text>
</g>

<!-- Annotation -->
<text x="30" y="640" class="subtitle">规则：</text>
<text x="30" y="658" class="muted">1. ROOT 往下一条竖线，每轮 user 从竖线横向分支出去（树形缩进）</text>
<text x="30" y="674" class="muted">2. user→llm→tool 继续往下缩进（同一列内垂直排列）</text>
<text x="30" y="690" class="muted">3. 分支（修改消息重发）往右偏移到新列，用虚线连接分支点</text>
<text x="30" y="706" class="muted">4. 不同分支用不同颜色区分（main=蓝，branch=绿）</text>

</svg>
